<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 2 Interactive Schema Studio & Enterprise Architecture Sandbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --bg-sidebar: #111726;
            --bg-card: #1a2236;
            --bg-code: #070a12;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.35);
            --cyan: #38bdf8;
            --green: #34d399;
            --yellow: #fbbf24;
            --pink: #f472b6;
            --red: #f87171;
            --text: #f8fafc;
            --text2: #94a3b8;
            --border: #28324a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 330px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c4b5fd, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-home {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
            font-weight: 600;
        }
        .nav-home:hover { color: #fff; background: var(--accent); }

        .chapter-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .chapter-group { margin-bottom: 1.2rem; }
        .chapter-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--cyan);
            padding: 0.4rem 0.6rem;
            font-weight: 800;
        }

        .slide-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text2);
            font-size: 0.85rem;
            transition: all 0.15s;
            margin-bottom: 3px;
        }

        .slide-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .slide-item.active { background: rgba(139, 92, 246, 0.2); color: #fff; border-left: 3px solid var(--accent); font-weight: 700; }
        .slide-num { font-size: 0.75rem; opacity: 0.6; width: 24px; }

        /* Main Workspace */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.75rem;
            background: var(--bg-sidebar);

        .slide-header-text h2 { font-size: 1.2rem; font-weight: 800; color: #fff; }
        .slide-header-text span { font-size: 0.82rem; color: var(--text2); }

        .fk-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.35);

        .badge-sol { background: rgba(52, 211, 153, 0.15); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.3); }
        .badge-real { background: rgba(56, 189, 248, 0.15); color: var(--cyan); border: 1px solid rgba(56, 189, 248, 0.3); }

        .diagram-box {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin: 1.25rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;

            background: rgba(52, 211, 153, 0.08);
            border-left: 4px solid var(--green);
            padding: 1.1rem;
            border-radius: 0 10px 10px 0;
            margin: 1.25rem 0;
        }
        .solution-box strong { color: var(--green); display: block; margin-bottom: 0.3rem; font-size: 0.92rem; }

        .scenario-box {
            background: rgba(56, 189, 248, 0.08);
            border-left: 4px solid var(--cyan);
            padding: 1.1rem;
            border-radius: 0 10px 10px 0;
            margin: 1.25rem 0;

        /* Interactive Sandbox Pane */
        .sandbox-pane {
            display: flex;
            flex-direction: column;
            background: #070a12;
            overflow: hidden;
        }

        .editor-header {
            padding: 0.7rem 1.2rem;
            background: #111726;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text2);
            font-weight: 700;
        }

        .sql-editor {
            flex: 1;
            background: var(--bg-code);
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.87rem;
            padding: 1.25rem;
            border: none;

            outline: none;
            line-height: 1.6;

        .editor-actions {
            padding: 0.75rem 1.2rem;
            background: #111726;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;

            color: #fff;
            border: none;

        .btn-reset {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reset:hover { color: #fff; border-color: var(--text2); }

        .results-area {

            background: #070a12;
            overflow: auto;
            padding: 1.2rem;
        }

        table {
            width: 100%;

            font-size: 0.82rem;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 1rem;

            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #111726;
            color: var(--cyan);
            position: sticky;
            top: 0;
            font-weight: 700;
        }

        td { color: #cbd5e1; }
        tr:hover td { background: rgba(255,255,255,0.03); }

        .status-msg {
            font-size: 0.86rem;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .status-success { background: rgba(52, 211, 153, 0.12); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.25); }
        .status-error { background: rgba(248, 113, 113, 0.12); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.25); }

        @media (max-width: 1100px) {
            .content-area { grid-template-columns: 1fr; }
            .sidebar { width: 280px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>📐 Schema Studio</h1>
        <a href="../index.html" class="nav-home">Hub</a>
    </div>
    <div class="chapter-list" id="chapterList"></div>
</aside>

<main class="main">
    <header class="topbar">
        <div class="slide-header-text">
            <h2 id="slideTitle">Loading Studio...</h2>
            <span id="slideSubtitle">Interactive Database Architecture</span>
        </div>

            🛡️ FK Enforcement: ON
        </div>
    </header>

        <div class="theory-pane" id="theoryPane"></div>
        <div class="sandbox-pane">
            <div class="editor-header">
                <span>💻 LIVE DDL & DML SANDBOX (SQLite WASM)</span>
                <span>Ctrl + Enter to Execute</span>
            </div>
            <textarea class="sql-editor" id="sqlEditor" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="btn-reset" onclick="resetCurrentSlide()">🔄 Reset Clean Schema</button>
                <button class="btn-run" onclick="runSQL()">▶ Run Architecture Script</button>

                <div class="status-msg status-success">Ready to execute schema architecture...</div>
            </div>
        </div>
    </div>
</main>

<script>
let db = null;
let currentChapterIdx = 0;
let currentSlideIdx = 0;
let fkEnabled = true;

const chapters = [
// ────────────────────────────────────────────────────────
// CHAPTER 1: ERD & RELATIONS
// ────────────────────────────────────────────────────────
{
    title: "1. ERD & Relational Entities",
    slides: [
        {
            title: "Entity, Attribute, Tuple & Domain Anatomy",
            subtitle: "Mapping domain nouns to relational database structures",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>Software applications process complex real-world concepts (users, subscriptions, hardware assets). If developers write code without a structured schema blueprint, data degrades into unstructured JSON blobs or messy spreadsheets where invalid data types crash production systems.</p>
                
                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>An <strong>Entity Relationship Diagram (ERD)</strong> establishes formal mathematics before writing table DDL:</p>
                <ul>
                    <li><strong>Entity:</strong> A distinct real-world object (becomes a database Table).</li>
                    <li><strong>Attribute:</strong> Properties describing the entity (becomes table Columns).</li>
                    <li><strong>Tuple:</strong> A single instantiated record of an entity (becomes a table Row).</li>
                    <li><strong>Domain:</strong> The set of legal values permitted for an attribute (enforced via SQL Data Types and Constraints).</li>
                </ul>

                <span class="section-badge badge-real">Real World Scenario</span>
                <div class="scenario-box">
                    <strong>🏢 Cloud SaaS Asset Registry</strong>
                    In AWS or Azure asset management, an organization tracks compute instances. Each instance must belong to a verified billing account and possess an immutable IP address and operating system type.
                </div>
            `,
            sql: `-- Step 1: Create clean Entity with explicit Domain types
DROP TABLE IF EXISTS compute_instances;
DROP TABLE IF EXISTS billing_accounts;

CREATE TABLE billing_accounts (
    account_id INTEGER PRIMARY KEY AUTOINCREMENT,
    company_name TEXT NOT NULL,
    credit_limit DECIMAL(12,2) NOT NULL DEFAULT 5000.00
);

CREATE TABLE compute_instances (
    instance_id INTEGER PRIMARY KEY AUTOINCREMENT,
    account_id INTEGER NOT NULL,
    hostname TEXT NOT NULL UNIQUE,
    vcpus INTEGER NOT NULL CHECK (vcpus IN (2, 4, 8, 16, 32, 64)),
    ram_gb INTEGER NOT NULL,
    status TEXT DEFAULT 'RUNNING' CHECK (status IN ('RUNNING', 'STOPPED', 'TERMINATED')),
    FOREIGN KEY (account_id) REFERENCES billing_accounts(account_id)
);

-- Step 2: Populate Tuples
INSERT INTO billing_accounts (company_name, credit_limit) VALUES ('Apex Fintech Labs', 25000.00);
INSERT INTO compute_instances (account_id, hostname, vcpus, ram_gb) VALUES 
(1, 'prod-api-router-01', 16, 64),
(1, 'prod-db-master-01', 64, 256);

-- Step 3: Verify clean joined Tuples
SELECT b.company_name, c.hostname, c.vcpus, c.ram_gb, c.status
FROM compute_instances c JOIN billing_accounts b ON c.account_id = b.account_id;`
        },
        {
            title: "One-to-One (1:1): Security & Blob Offloading",
            subtitle: "Splitting wide tables for IAM isolation and cache performance",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>Putting 40 columns inside a single <code>users</code> table—including password hashes, Social Security Numbers (SSNs), and 5MB bio markdown blobs—destroys performance. Every authentication check or UI navbar load drags heavy unneeded columns into RAM memory pages and exposes PII to general backend queries.</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>A 1:1 relationship isolates specialized attributes into a child table linked by a primary key that doubles as a foreign key:</p>
                <div class="diagram-box">[ USERS (Core Auth) ] 1 &lt;=======&gt; 1 [ USER_KYC_PII (Secure) ]
(user_id PK)                        (user_id PK &amp; FK to users)</div>

                <span class="section-badge badge-real">Real World Scenario</span>
                <div class="scenario-box">
                    <strong>🏦 Banking KYC &amp; IAM Security</strong>
                    When login APIs authenticate a user, they only query <code>users</code> (id, email, status). The sensitive <code>user_kyc_pii</code> table (tax ID, passport scan, home address) resides in an isolated schema accessed strictly by compliance auditors.
                </div>
            `,
            sql: `-- Step 1: Core User table (lightweight, high-frequency queries)
DROP TABLE IF EXISTS user_kyc_pii;
DROP TABLE IF EXISTS users;

CREATE TABLE users (
    user_id INTEGER PRIMARY KEY AUTOINCREMENT,
    username TEXT NOT NULL UNIQUE,
    email TEXT NOT NULL UNIQUE,
    is_active INTEGER DEFAULT 1
);

-- Step 2: Child 1:1 table where user_id is BOTH Primary Key and Foreign Key
CREATE TABLE user_kyc_pii (
    user_id INTEGER PRIMARY KEY,
    ssn_hash TEXT NOT NULL UNIQUE,
    passport_number TEXT NOT NULL,
    verification_status TEXT DEFAULT 'PENDING',
    FOREIGN KEY (user_id) REFERENCES users(user_id) ON DELETE CASCADE
);

INSERT INTO users (username, email) VALUES ('alex_vault', 'alex@securesf.com');
INSERT INTO user_kyc_pii (user_id, ssn_hash, passport_number, verification_status)
VALUES (1, 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855', 'PASS-998877', 'VERIFIED');

-- Verify 1:1 secure lookup
SELECT u.username, k.verification_status, k.passport_number
FROM users u JOIN user_kyc_pii k ON u.user_id = k.user_id;`
        },
        {
            title: "One-to-Many (1:M): Parent-Child Cardinality",
            subtitle: "Enforcing ownership hierarchies and cascading rules",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>Without One-to-Many relationships, storing multiple shipping addresses or line items for a customer forces engineers to either duplicate the entire customer name and phone on every single line item row, or invent messy columns like <code>address_1</code>, <code>address_2</code>, <code>address_3</code>.</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>In 1:M relationships, the parent entity exists once, while the child entity contains a foreign key pointing to the parent. The foreign key column MUST sit on the <strong>Many (&lt;) child side</strong>.</p>

                <span class="section-badge badge-real">Real World Scenario</span>
                <div class="scenario-box">
                    <strong>🛒 E-Commerce Order Line Items</strong>
                    One Order header (parent) owns dozens of Order Items (children). If an order is canceled or purged, all subordinate order items must automatically clean up.
                </div>
            `,
            sql: `-- Step 1: Parent Order Header
DROP TABLE IF EXISTS order_line_items;
DROP TABLE IF EXISTS orders;

CREATE TABLE orders (
    order_id INTEGER PRIMARY KEY AUTOINCREMENT,
    customer_email TEXT NOT NULL,
    order_date DATETIME DEFAULT CURRENT_TIMESTAMP
);

-- Step 2: Child Line Items (FK sits on the Many side)
CREATE TABLE order_line_items (
    item_id INTEGER PRIMARY KEY AUTOINCREMENT,
    order_id INTEGER NOT NULL,
    sku TEXT NOT NULL,
    qty INTEGER NOT NULL CHECK (qty > 0),
    unit_price DECIMAL(10,2) NOT NULL,
    FOREIGN KEY (order_id) REFERENCES orders(order_id) ON DELETE CASCADE
);

INSERT INTO orders (customer_email) VALUES ('procurement@spacex.com');
INSERT INTO order_line_items (order_id, sku, qty, unit_price) VALUES 
(1, 'TITANIUM-VALVE-09', 50, 120.00),
(1, 'HEAT-SHIELD-TILE', 200, 45.50);

SELECT o.order_id, o.customer_email, i.sku, i.qty, (i.qty * i.unit_price) AS line_total
FROM orders o JOIN order_line_items i ON o.order_id = i.order_id;`
        },
        {
            title: "Many-to-Many (M:N): Junction Table Payloads",
            subtitle: "Resolving M:N complexity and storing relationship metadata",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>If students enroll in multiple courses, and each course contains multiple students, you cannot store a foreign key in either table without creating infinite circular loops or repeating rows.</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>To resolve M:N relationships, relational theory requires creating a <strong>Junction (Association) Table</strong>. Crucially, junction tables store relationship payload data (timestamps, grades, access levels).</p>

                <span class="section-badge badge-real">Real World Scenario</span>
                <div class="scenario-box">
                    <strong>🎓 University LMS Portal</strong>
                    Students enroll in Courses. The junction table <code>enrollments</code> uses a composite primary key <code>(student_id, course_id)</code> to guarantee a student cannot enroll in the exact same class twice.
                </div>
            `,
            sql: `DROP TABLE IF EXISTS enrollments;
DROP TABLE IF EXISTS courses;
DROP TABLE IF EXISTS students;

CREATE TABLE students (student_id INTEGER PRIMARY KEY, full_name TEXT NOT NULL);
CREATE TABLE courses (course_id INTEGER PRIMARY KEY, course_code TEXT UNIQUE, title TEXT NOT NULL);

-- Junction table with Composite Primary Key & Payload Attributes
CREATE TABLE enrollments (
    student_id INTEGER NOT NULL,
    course_id INTEGER NOT NULL,
    enrolled_semester TEXT NOT NULL,
    final_grade TEXT,
    PRIMARY KEY (student_id, course_id),
    FOREIGN KEY (student_id) REFERENCES students(student_id) ON DELETE CASCADE,
    FOREIGN KEY (course_id) REFERENCES courses(course_id) ON DELETE CASCADE
);

INSERT INTO students VALUES (101, 'Ada Lovelace'), (102, 'Alan Turing');
INSERT INTO courses VALUES (1, 'CS101', 'Algorithms'), (2, 'MATH402', 'Cryptography');

INSERT INTO enrollments VALUES 
(101, 1, 'Fall 2026', 'A+'),
(101, 2, 'Fall 2026', 'A'),
(102, 2, 'Fall 2026', 'A+');

SELECT s.full_name, c.course_code, c.title, e.enrolled_semester, e.final_grade
FROM enrollments e
JOIN students s ON e.student_id = s.student_id
JOIN courses c ON e.course_id = c.course_id;`
        },
        {
            title: "Self-Referencing Hierarchies & Recursive CTEs",
            subtitle: "Modeling recursive trees inside flat relational tables",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>How do you store Reddit threaded comment replies of arbitrary depth, or corporate employee reporting chains (VP → Director → Manager → Engineer) without creating 20 tables?</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>A table can reference its own primary key! A <code>parent_id</code> column points directly to <code>id</code> in the exact same table. To query arbitrary tree depths, we execute SQL <strong>Recursive Common Table Expressions (CTEs)</strong>.</p>

                <span class="section-badge badge-real">Real World Scenario</span>
                <div class="scenario-box">
                    <strong>🏢 Corporate Org Chart Navigation</strong>
                    Displaying every subordinate under the Chief Technology Officer (CTO), calculating depth hierarchy levels dynamically.
                </div>
            `,
            sql: `DROP TABLE IF EXISTS employees_org;

CREATE TABLE employees_org (
    emp_id INTEGER PRIMARY KEY AUTOINCREMENT,
    manager_id INTEGER NULL,
    name TEXT NOT NULL,
    role_title TEXT NOT NULL,
    FOREIGN KEY (manager_id) REFERENCES employees_org(emp_id) ON DELETE SET NULL
);

INSERT INTO employees_org (emp_id, manager_id, name, role_title) VALUES
(1, NULL, 'Sarah Connor', 'Chief Technology Officer'),
(2, 1, 'John Reese', 'VP of Engineering'),
(3, 2, 'Miles Dyson', 'Lead Systems Architect'),
(4, 3, 'T-800 Unit', 'Staff Backend Engineer');

-- Recursive CTE traversal from CTO down to engineers:
WITH RECURSIVE org_tree AS (
    SELECT emp_id, manager_id, name, role_title, 1 AS hierarchy_level, name AS chain
    FROM employees_org WHERE manager_id IS NULL
    UNION ALL
    SELECT e.emp_id, e.manager_id, e.name, e.role_title, t.hierarchy_level + 1, t.chain || ' -> ' || e.name
    FROM employees_org e JOIN org_tree t ON e.manager_id = t.emp_id
)
SELECT hierarchy_level, name, role_title, chain FROM org_tree ORDER BY hierarchy_level;`
        }
    ]
},

// ────────────────────────────────────────────────────────
// CHAPTER 2: KEYS ARCHITECTURE
// ────────────────────────────────────────────────────────
{
    title: "2. Primary & Foreign Key Architecture",
    slides: [
        {
            title: "Natural Keys vs Surrogate Keys",

        <div class="chapter-group">
            <div class="chapter-title">${ch.title}</div>
            ${ch.slides.map((sl, sIdx) => `
                <div class="slide-item ${cIdx === 0 && sIdx === 0 ? 'active' : ''}" 
                     id="slide_${cIdx}_${sIdx}" 
                     onclick="selectSlide(${cIdx}, ${sIdx})">
                    <span class="slide-num">${sIdx + 1}.</span>
                    <span>${sl.title}</span>
                </div>
            `).join('')}
        </div>
    `).join('');
}

function selectSlide(cIdx, sIdx) {
    currentChapterIdx = cIdx;
    currentSlideIdx = sIdx;
    
    document.querySelectorAll('.slide-item').forEach(el => el.classList.remove('active'));
    const activeEl = document.getElementById(`slide_${cIdx}_${sIdx}`);
    if (activeEl) activeEl.classList.add('active');

    const slide = chapters[cIdx].slides[sIdx];
    document.getElementById('slideTitle').textContent = slide.title;
    document.getElementById('slideSubtitle').textContent = slide.subtitle;
    document.getElementById('theoryPane').innerHTML = slide.theory;
    document.getElementById('sqlEditor').value = slide.sql.trim();

    resetCurrentSlide();
}

function toggleFK() {
    fkEnabled = !fkEnabled;
    const btn = document.getElementById('fkToggleBtn');
    if (fkEnabled) {
        btn.innerHTML = "🛡️ FK Enforcement: ON";
        btn.style.color = "var(--green)";
        btn.style.borderColor = "rgba(52, 211, 153, 0.35)";
        if (db) db.run("PRAGMA foreign_keys = ON;");
    } else {
        btn.innerHTML = "⚠️ FK Enforcement: OFF";
        btn.style.color = "var(--yellow)";
        btn.style.borderColor = "rgba(251, 191, 36, 0.35)";
        if (db) db.run("PRAGMA foreign_keys = OFF;");
    }
}

function resetCurrentSlide() {
    if (!db) return;
    const SQL = db.constructor;
    db.close();
    db = new SQL();
    db.run(fkEnabled ? "PRAGMA foreign_keys = ON;" : "PRAGMA foreign_keys = OFF;");
    
    document.getElementById('sqlEditor').value = chapters[currentChapterIdx].slides[currentSlideIdx].sql.trim();
    runSQL();
}

function runSQL() {
    if (!db) return;
    const sqlText = document.getElementById('sqlEditor').value;
    const resArea = document.getElementById('resultsArea');
    const startTime = performance.now();

    try {
        const results = db.exec(sqlText);
        const elapsed = (performance.now() - startTime).toFixed(1);

        if (results.length === 0) {
            resArea.innerHTML = `<div class="status-msg status-success">✅ Architecture statements executed successfully (${elapsed}ms). Clean DDL/DML state.</div>`;
            return;
        }

        let html = `<div class="status-msg status-success">✅ Query execution completed in ${elapsed}ms</div>`;
        results.forEach(res => {
            html += `<table><thead><tr>${res.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>`;
            res.values.forEach(row => {
                html += `<tr>${row.map(v => `<td>${v === null ? '<i style="color:var(--text2)">NULL</i>' : v}</td>`).join('')}</tr>`;
            });
            html += `</tbody></table><br>`;
        });
        resArea.innerHTML = html;
    } catch (err) {
        resArea.innerHTML = `<div class="status-msg status-error">❌ SQLite Execution Error: ${err.message}</div>`;
    }
}

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runSQL();
    }
});

window.onload = init;
</script>
</body>
</html>
