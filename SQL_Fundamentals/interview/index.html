<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Interview Preparation - 105+ Questions with Answers & Recruiter Tips</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #111827;
            --bg3: #1a1a2e;
            --bg4: #232740;
            --accent: #6366f1;
            --accent2: #818cf8;
            --cyan: #22d3ee;
            --green: #34d399;
            --orange: #fbbf24;
            --pink: #f472b6;
            --red: #ef4444;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --border: #2d3352;
            --radius: 14px
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7
        }

        /* BG Animation */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-glow .g {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .1
        }

        .g1 {
            width: 600px;
            height: 600px;
            background: #6366f1;
            top: -150px;
            left: -100px
        }

        .g2 {
            width: 400px;
            height: 400px;
            background: #22d3ee;
            bottom: -100px;
            right: -100px
        }

        /* Header */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 50px 24px 30px
        }

        .header .badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(99, 102, 241, .12);
            border: 1px solid rgba(99, 102, 241, .25);
            border-radius: 50px;
            font-size: .78rem;
            font-weight: 600;
            color: var(--accent2);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #6366f1, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.15;
            margin-bottom: 12px
        }

        .header p {
            font-size: 1.05rem;
            color: var(--text2);
            max-width: 650px;
            margin: 0 auto
        }

        /* Toolbar */
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(17, 24, 39, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: .9rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s
        }

        .search-box input:focus {
            border-color: var(--accent)
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: .85rem
        }

        .filter-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .filter-btn {
            padding: 7px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: .8rem;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
            font-weight: 500
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff
        }

        .filter-btn.easy {
            border-color: rgba(52, 211, 153, .3)
        }

        .filter-btn.easy.active {
            background: var(--green);
            border-color: var(--green)
        }

        .filter-btn.medium {
            border-color: rgba(251, 191, 36, .3)
        }

        .filter-btn.medium.active {
            background: var(--orange);
            border-color: var(--orange);
            color: #000
        }

        .filter-btn.hard {
            border-color: rgba(239, 68, 68, .3)
        }

        .filter-btn.hard.active {
            background: var(--red);
            border-color: var(--red)
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            font-size: .8rem;
            color: var(--text3);
            margin-left: auto;
            align-items: center
        }

        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 4px
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px
        }

        /* Category Section */
        .category {
            margin-bottom: 40px
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px 0;
            border-bottom: 2px solid var(--border)
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0
        }

        .category-header h2 {
            font-size: 1.4rem;
            font-weight: 800
        }

        .category-header .count {
            margin-left: auto;
            padding: 4px 14px;
            background: var(--bg3);
            border-radius: 20px;
            font-size: .78rem;
            color: var(--text2)
        }

        /* Question Card */
        .q-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
            transition: all .3s
        }

        .q-card:hover {
            border-color: rgba(99, 102, 241, .3)
        }

        .q-header {
            padding: 18px 22px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: background .2s
        }

        .q-header:hover {
            background: rgba(255, 255, 255, .02)
        }

        .q-num {
            min-width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .78rem;
            font-weight: 700;
            flex-shrink: 0;
            background: var(--bg4);
            color: var(--text2)
        }

        .q-text {
            flex: 1;
            font-weight: 600;
            font-size: .96rem;
            line-height: 1.5
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0
        }

        .q-diff {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .q-diff.easy {
            background: rgba(52, 211, 153, .12);
            color: var(--green)
        }

        .q-diff.medium {
            background: rgba(251, 191, 36, .12);
            color: var(--orange)
        }

        .q-diff.hard {
            background: rgba(239, 68, 68, .12);
            color: var(--red)
        }

        .q-toggle {
            font-size: 1.2rem;
            color: var(--text3);
            transition: transform .3s;
            cursor: pointer
        }

        .q-card.open .q-toggle {
            transform: rotate(180deg)
        }

        /* Answer */
        .q-answer {
            display: none;
            padding: 0 22px 22px;
            padding-left: 70px
        }

        .q-card.open .q-answer {
            display: block;
            animation: fadeIn .3s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .q-answer h4 {
            font-size: .88rem;
            font-weight: 700;
            color: var(--accent2);
            margin: 14px 0 8px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .q-answer p {
            color: var(--text2);
            font-size: .9rem;
            margin-bottom: 10px
        }

        .q-answer ul {
            margin: 0 0 12px 18px;
            color: var(--text2);
            font-size: .88rem
        }

        .q-answer li {
            margin-bottom: 5px
        }

        .q-answer li strong {
            color: var(--text)
        }

        .q-answer code {
            background: var(--bg4);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .82rem;
            color: var(--cyan)
        }

        .q-answer pre {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            margin: 10px 0 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .82rem;
            line-height: 1.6;
            color: var(--text2);
            overflow-x: auto;
            white-space: pre
        }

        /* Recruiter Tip */
        .recruiter-tip {
            background: rgba(99, 102, 241, .06);
            border: 1px solid rgba(99, 102, 241, .15);
            border-radius: 10px;
            padding: 14px 18px;
            margin: 14px 0;
            position: relative
        }

        .recruiter-tip::before {
            content: '🎤';
            position: absolute;
            top: -10px;
            left: 14px;
            background: var(--bg3);
            padding: 0 6px;
            font-size: .9rem
        }

        .recruiter-tip h5 {
            color: var(--accent2);
            font-size: .82rem;
            font-weight: 700;
            margin-bottom: 6px
        }

        .recruiter-tip p {
            font-size: .84rem;
            color: var(--text2);
            margin: 0;
            font-style: italic
        }

        /* Key Point */
        .key-point {
            background: rgba(52, 211, 153, .06);
            border-left: 3px solid var(--green);
            padding: 10px 16px;
            margin: 10px 0;
            border-radius: 0 8px 8px 0;
            font-size: .86rem;
            color: var(--text2)
        }

        /* Compare table */
        .cmp {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: .84rem
        }

        .cmp th {
            background: var(--bg4);
            padding: 8px 12px;
            text-align: left;
            color: var(--text);
            font-weight: 600;
            border: 1px solid var(--border)
        }

        .cmp td {
            padding: 8px 12px;
            border: 1px solid var(--border);
            color: var(--text2)
        }

        /* Print */
        @media print {

            .toolbar,
            .bg-glow {
                display: none !important
            }

            .q-answer {
                display: block !important
            }

            .q-card {
                break-inside: avoid
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow">
        <div class="g g1"></div>
        <div class="g g2"></div>
    </div>

    <div class="header">
        <div class="badge">Comprehensive Interview Preparation</div>
        <h1>SQL Interview Questions & Answers</h1>
        <p>Over 105 curated questions spanning fundamentals, architecture, complex queries, and advanced senior
            topics—complete with recruiter presentation tips.</p>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search across questions..." oninput="filterQuestions()">
        </div>
        <div class="filter-btns">
            <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
            <button class="filter-btn easy" onclick="setFilter('easy',this)">Easy</button>
            <button class="filter-btn medium" onclick="setFilter('medium',this)">Medium</button>
            <button class="filter-btn hard" onclick="setFilter('hard',this)">Hard</button>
        </div>
        <div class="stats-bar">
            <span id="visibleCount">Loading...</span>
            <span>|</span>
            <span><button class="filter-btn" onclick="expandAll()" style="padding:4px 10px">Expand All</button></span>
            <span><button class="filter-btn" onclick="collapseAll()" style="padding:4px 10px">Collapse
                    All</button></span>
        </div>
    </div>

    <div class="container" id="questionsContainer"></div>

    <script>
        const data = [
            // ═══════════════════════════════════════════
            // 1. DATABASE BASICS & ARCHITECTURE
            // ═══════════════════════════════════════════
            {
                cat: "Database Basics & Architecture", icon: "🏗️", color: "#6366f1", questions: [
                    {
                        q: "What is a database? How is it different from a spreadsheet?", d: "easy",
                        a: `<p>A <strong>database</strong> is an organized collection of structured data stored electronically and managed by a DBMS. Unlike spreadsheets, databases offer:</p>
<ul>
<li><strong>Concurrency:</strong> Safe simultaneous reads and writes by thousands of users.</li>
<li><strong>Scale:</strong> Optimized for gigabytes to petabytes of data without memory limits.</li>
<li><strong>Integrity:</strong> Enforces data types, foreign keys, and rules to prevent bad data.</li>
<li><strong>ACID Guarantees:</strong> Ensures transactions are atomic, consistent, isolated, and durable during failures.</li>
</ul>
<div class="recruiter-tip"><h5>How to Present This</h5><p>"I explain databases as the transactional backbone of software. While spreadsheets are great for ad-hoc user analysis on small sets, relational databases provide concurrency control, index optimization, and data integrity guarantees that scale to millions of concurrent operations."</p></div>`},

                    {
                        q: "What is an RDBMS? Name popular ones and their trade-offs.", d: "easy",
                        a: `<p>An <strong>RDBMS (Relational Database Management System)</strong> stores data in tables linked by primary and foreign keys, using SQL for data manipulation.</p>
<table class="cmp">
<tr><th>Engine</th><th>Best For</th><th>Key Strengths</th></tr>
<tr><td><strong>PostgreSQL</strong></td><td>Complex web apps, analytics, geo-spatial</td><td>Extensible, rich JSONB, PostGIS, standards-compliant.</td></tr>
<tr><td><strong>MySQL</strong></td><td>Web applications, CMS (WordPress)</td><td>Fast reads, simple replication, huge community.</td></tr>
<tr><td><strong>SQL Server</strong></td><td>Enterprise .NET ecosystems</td><td>Strong BI tooling, integrated security, robust optimizer.</td></tr>
<tr><td><strong>SQLite</strong></td><td>Mobile apps, IoT, local development</td><td>Zero-config, single file, serverless embedded engine.</td></tr>
</table>`},

                    {
                        q: "Explain SQL vs NoSQL. When would you choose each paradigm?", d: "medium",
                        a: `<p><strong>SQL (Relational):</strong> Structured tables, strict schemas, ACID compliance, and complex multi-table joins.</p>
<p><strong>NoSQL (Non-relational):</strong> Document (MongoDB), Key-Value (Redis), Columnar (Cassandra), or Graph (Neo4j) engines tailored for schema flexibility and high-scale horizontal partitioning.</p>
<div class="key-point"><strong>Use SQL when:</strong> Data relationships are complex, financial accuracy is mandatory, or ad-hoc querying flexibility is needed.</div>
<div class="key-point"><strong>Use NoSQL when:</strong> Schema evolves rapidly, massive ingest volume exceeds single-node vertical scaling, or access patterns are pure key-lookup.</div>
<div class="recruiter-tip"><h5>How to Present This</h5><p>"In modern engineering, we practice polyglot persistence. For example, I typically use PostgreSQL as the system of record for structured order workflows, while leveraging Redis for sub-millisecond session caching and Elasticsearch for full-text product search."</p></div>`},

                    {
                        q: "What is the difference between Database, Schema, Table, and Tablespace?", d: "easy",
                        a: `<ul>
<li><strong>Database:</strong> A self-contained collection of schemas, users, and catalog data managed by an engine instance.</li>
<li><strong>Schema:</strong> A logical folder or namespace inside a database that isolates related tables and permissions (e.g., <code>public</code>, <code>billing</code>, <code>analytics</code>).</li>
<li><strong>Table:</strong> The physical storage unit consisting of ordered rows and typed columns.</li>
<li><strong>Tablespace:</strong> A physical storage location on the file system or disk drive where database objects are actually written.</li>
</ul>`},

                    {
                        q: "What are the four categories of SQL commands (DDL, DML, DCL, TCL)?", d: "easy",
                        a: `<table class="cmp">
<tr><th>Category</th><th>Full Name</th><th>Commands</th><th>Purpose</th></tr>
<tr><td><strong>DDL</strong></td><td>Data Definition Language</td><td>CREATE, ALTER, DROP, TRUNCATE</td><td>Define or alter table schemas and indexes.</td></tr>
<tr><td><strong>DML</strong></td><td>Data Manipulation Language</td><td>SELECT, INSERT, UPDATE, DELETE</td><td>Retrieve and modify table data rows.</td></tr>
<tr><td><strong>DCL</strong></td><td>Data Control Language</td><td>GRANT, REVOKE</td><td>Manage user roles and security privileges.</td></tr>
<tr><td><strong>TCL</strong></td><td>Transaction Control Language</td><td>COMMIT, ROLLBACK, SAVEPOINT</td><td>Manage transaction boundaries and savepoints.</td></tr>
</table>`},

                    {
                        q: "What is the difference between 2-Tier and 3-Tier database architecture?", d: "medium",
                        a: `<p>In a <strong>2-tier architecture (Client-Server)</strong>, client applications talk directly to the database server via drivers like ODBC/JDBC. Security and business logic often reside inside UI code or stored procedures.</p>
<p>In a <strong>3-tier architecture</strong>, an application server (API/backend layer) sits between the client and database. This prevents direct database exposure, improves connection pooling, centralizes security, and allows independent scaling of application logic.</p>`},

                    {
                        q: "What is an internal database storage engine? Compare InnoDB vs MyISAM.", d: "hard",
                        a: `<p>A storage engine handles how data rows and indexes are written to and read from disk.</p>
<table class="cmp">
<tr><th>Feature</th><th>InnoDB (Modern Default)</th><th>MyISAM (Legacy)</th></tr>
<tr><td><strong>Transactions</strong></td><td>Full ACID support</td><td>No transaction support</td></tr>
<tr><td><strong>Locking Level</strong></td><td>Row-level locking (high concurrency)</td><td>Table-level locking (slow writes)</td></tr>
<tr><td><strong>Foreign Keys</strong></td><td>Supported</td><td>Not supported</td></tr>
<tr><td><strong>Crash Recovery</strong></td><td>Automatic via Redo logs</td><td>Manual repair required after crash</td></tr>
</table>`}
                ]
            },

            // ═══════════════════════════════════════════
            // 2. DATA TYPES & STORAGE EFFICIENCY
            // ═══════════════════════════════════════════
            {
                cat: "Data Types & Storage Efficiency", icon: "🔢", color: "#7c3aed", questions: [
                    {
                        q: "Why should you never use FLOAT or DOUBLE for monetary values?", d: "easy",
                        a: `<p>Floating-point types use <strong>IEEE 754 base-2 approximation</strong>. Because base-10 fractions like 0.1 cannot be represented finitely in base-2 binary, tiny precision loss occurs.</p>
<pre>SELECT 0.1 + 0.2; -- Produces 0.30000000000000004</pre>
<p>Over millions of financial transactions, these rounding anomalies accumulate into significant ledger errors.</p>
<div class="key-point">Always use exact fixed-point decimals like <code>DECIMAL(18,4) / NUMERIC(10,2)</code> or store currency values as integer cents (e.g., $19.99 stored as <code>1999</code>).</div>
<div class="recruiter-tip"><h5>How to Present This</h5><p>"This is a classic financial engineering trap. I always specify DECIMAL for money. In one system review, converting legacy FLOAT price columns to DECIMAL eliminated persistent pennies-off rounding errors during end-of-day bank reconciliation."</p></div>`},

                    {
                        q: "Compare CHAR, VARCHAR, and TEXT. When should each be used?", d: "medium",
                        a: `<table class="cmp">
<tr><th>Type</th><th>Storage allocated</th><th>Performance characteristics</th><th>Optimal use case</th></tr>
<tr><td><code>CHAR(n)</code></td><td>Fixed exactly at n bytes</td><td>Fast lookup; pads with trailing spaces.</td><td>ISO codes (CHAR(2) country code, MD5 hash).</td></tr>
<tr><td><code>VARCHAR(n)</code></td><td>Variable length + 1-2 byte header</td><td>Saves space; no padding overhead.</td><td>Names, email addresses, URLs.</td></tr>
<tr><td><code>TEXT / CLOB</code></td><td>Variable, up to gigabytes</td><td>Often stored out-of-row; slower sorts.</td><td>Long blog posts, JSON logs, document bodies.</td></tr>
</table>`},

                    {
                        q: "What are the pros and cons of UUID vs Auto-Increment Integer primary keys?", d: "medium",
                        a: `<table class="cmp">
<tr><th>Aspect</th><th>Auto-Increment INT / BIGINT</th><th>UUID v4 (Random) / v7 (Time-ordered)</th></tr>
<tr><td><strong>Storage Size</strong></td><td>4 or 8 bytes per row</td><td>16 bytes per row (binary) or 36 bytes (text)</td></tr>
<tr><td><strong>B-Tree Indexing</strong></td><td>Sequential appends; optimal cache locality</td><td>Random UUIDs cause B-tree page splits and fragmentation</td></tr>
<tr><td><strong>Security / ID Guessing</strong></td><td>Predictable (e.g., /users/42 exposes order)</td><td>Unpredictable and unguessable external ID</td></tr>
<tr><td><strong>Distributed Generation</strong></td><td>Requires central DB coordination</td><td>Generated offline on client or API servers without collisions</td></tr>
</table>
<div class="recruiter-tip"><h5>How to Present This</h5><p>"I recommend a hybrid pattern: use sequential 8-byte BIGINT auto-increment IDs for internal foreign key joins to maintain B-tree performance, while generating UUID v7 (time-sequential) columns for public API endpoints and distributed tracing."</p></div>`},

                    {
                        q: "Explain the ENUM data type. Why do some architects avoid it?", d: "medium",
                        a: `<p>An <code>ENUM</code> restricts a column to a predefined list of strings stored internally as compact integers.</p>
<ul>
<li><strong>Pros:</strong> Compact disk storage, fast integer comparison, built-in domain constraint check.</li>
<li><strong>Cons:</strong> Adding or removing values requires schema locks (<code>ALTER TYPE</code>), non-standard across different SQL engines, and numeric ordering can confuse developers.</li>
</ul>
<p><strong>Modern Alternative:</strong> Use a standard <code>VARCHAR</code> column enforced by a table <code>CHECK (status IN ('active','closed'))</code> or a dedicated lookup reference table.</p>`},

                    {
                        q: "What is the difference between TIMESTAMP and TIMESTAMPTZ (or DATETIME)?", d: "medium",
                        a: `<ul>
<li><code>DATETIME / TIMESTAMP without timezone</code> stores literally the date and time provided (e.g., '2026-07-02 14:00:00') without context.</li>
<li><code>TIMESTAMPTZ (TIMESTAMP with timezone)</code> converts the input time to UTC on storage and converts it back to the client session timezone on query retrieval.</li>
</ul>
<div class="key-point">For distributed or global systems, always store timestamps in UTC (using <code>TIMESTAMPTZ</code>) to avoid daylight savings confusion and cross-timezone comparison bugs.</div>`},

                    {
                        q: "What happens internally when column data exceeds row size limits?", d: "hard",
                        a: `<p>Database pages are fixed in size (typically 8KB in SQL Server/PostgreSQL or 16KB in InnoDB). If a table contains wide columns (like multiple large <code>VARCHAR</code> or <code>TEXT</code> fields) that exceed the page limit:</p>
<p>The engine stores an in-row <strong>pointer (20-24 bytes)</strong> and offloads the actual bulk data to separate <strong>Overflow Pages (or TOAST tables in PostgreSQL)</strong>. Querying overflow data requires extra disk reads unless excluded via specific column selection.</p>`}
                ]
            },

            // ═══════════════════════════════════════════
            // 3. CRUD & QUERY EXECUTION ORDER
            // ═══════════════════════════════════════════
            {
                cat: "CRUD & Query Execution Order", icon: "✏️", color: "#10b981", questions: [

<tr><td><strong>SERIALIZABLE</strong></td><td>Prevented ✅</td><td>Prevented ✅</td><td>Prevented ✅</td><td>Strict; potential serialization failures</td></tr>
</table>`},

                        a: `<p>A <strong>Deadlock</strong> occurs when two transactions hold locks each other needs, forming an unbreakable circular wait:</p>
<pre>Tx A: Locks Row 1 --> Waits for Row 2
Tx B: Locks Row 2 --> Waits for Row 1 (DEADLOCK!)</pre>
<p><strong>Resolution:</strong> The engine deadlock detector identifies circular chains, automatically aborts (rolls back) one transaction (the "victim"), and throws an exception so the application can retry.</p>
<p><strong>Prevention Strategies:</strong></p>
<ul>
<li>Enforce uniform lock ordering across all application microservices (always update Row 1 before Row 2).</li>
<li>Keep transactions short and concise.</li>
<li>Use optimistic concurrency or explicitly set lock statement timeouts.</li>
</ul>`}

<p>No repeating groups or comma-separated lists in cells. Each row must have a unique primary key identifier.</p>
<pre>❌ | id | name  | tags              |
   | 1  | Alice | "sql,python,node" | -- Non-atomic!

✅ Break tags into separate normalized junction rows.</pre>

<h4>2NF — No Partial Dependencies</h4>
<p>Applies to composite primary keys. Every non-key column must depend on the <em>entire</em> composite primary key, not just part of it.</p>
<pre>❌ Table: enrollments (student_id, course_id, student_name, grade)
-- student_name depends only on student_id! Move student_name to students table.</pre>

<h4>3NF — No Transitive Dependencies</h4>
<p>Non-key columns cannot depend on other non-key columns ("Everything depends on the key, the whole key, and nothing but the key").</p>
<pre>❌ Table: employees (id, name, dept_id, dept_location)

        // RENDERING ENGINE
        // ──────────────────────────────────────────
        let currentFilter = 'all';

        function render() {
            const container = document.getElementById('questionsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let html = '';
            let visible = 0;
            let questionNum = 0;

            data.forEach(cat => {
                const filteredQ = cat.questions.filter(q => {
                    const matchesDiff = currentFilter === 'all' || q.d === currentFilter;
                    const matchesSearch = !searchTerm || q.q.toLowerCase().includes(searchTerm) || q.a.toLowerCase().includes(searchTerm);
                    return matchesDiff && matchesSearch;
                });

                if (filteredQ.length === 0) return;

                html += `<div class="category">
            <div class="category-header">
                <div class="category-icon" style="background:${cat.color}15;color:${cat.color}">${cat.icon}</div>
                <h2>${cat.cat}</h2>
                <span class="count">${filteredQ.length} questions</span>
            </div>`;

                filteredQ.forEach(q => {
                    questionNum++;
                    visible++;
                    html += `<div class="q-card" data-diff="${q.d}">
                <div class="q-header" onclick="this.parentElement.classList.toggle('open')">
                    <span class="q-num">${questionNum}</span>
                    <span class="q-text">${q.q}</span>
                    <div class="q-meta">
                        <span class="q-diff ${q.d}">${q.d}</span>
                        <span class="q-toggle">▼</span>
                    </div>
                </div>
                <div class="q-answer">${q.a}</div>
            </div>`;
                });

                html += '</div>';
            });

            container.innerHTML = html;
            document.getElementById('visibleCount').textContent = `${visible} questions displayed`;
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function filterQuestions() { render(); }
        function expandAll() { document.querySelectorAll('.q-card').forEach(c => c.classList.add('open')); }
        function collapseAll() { document.querySelectorAll('.q-card').forEach(c => c.classList.remove('open')); }

        // Init
        render();
    </script>
