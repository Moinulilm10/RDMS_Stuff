{title:"Window Functions Introduction",subtitle:"Calculations across rows without collapsing groups",content:`
<div class="slide-body">
<h3>🪟 What are Window Functions?</h3>
<p>Window functions perform calculations across a set of rows <strong>related to the current row</strong>, WITHOUT grouping rows together. Unlike GROUP BY, they keep all individual rows in the result.</p>

<pre>-- Syntax:
function_name(...) OVER (
    [PARTITION BY column]    -- Define groups (like GROUP BY but keeps rows)
    [ORDER BY column]        -- Define order within partition
    [frame_clause]           -- Define which rows to include
)</pre>

<h3>GROUP BY vs Window Functions</h3>
<table class="cmp-table">
<tr><th>Feature</th><th>GROUP BY</th><th>Window Functions</th></tr>
<tr><td>Output rows</td><td>One row per group</td><td>All original rows</td></tr>
<tr><td>Individual data</td><td>Lost (aggregated)</td><td>Preserved</td></tr>
<tr><td>Ranking</td><td>Not possible</td><td>ROW_NUMBER, RANK</td></tr>
<tr><td>Running totals</td><td>Not possible</td><td>SUM() OVER (ORDER BY)</td></tr>
<tr><td>Previous/Next row</td><td>Not possible</td><td>LAG, LEAD</td></tr>
</table>

<div class="info-box tip">
<div class="info-box-title">💡 When to Use Window Functions</div>
<ul>
<li>Ranking within groups (top 3 per department)</li>
<li>Running totals / moving averages</li>
<li>Comparing each row to group aggregate</li>
<li>Accessing previous/next row values</li>
<li>Percentile / distribution calculations</li>
</ul>
</div>
</div>`,sql:`-- Window function vs GROUP BY comparison:
-- Each employee with their department's average (without losing detail)
SELECT 
    first_name,
    department_id,
    salary,
    ROUND(AVG(salary) OVER (PARTITION BY department_id), 2) AS dept_avg,
    salary - ROUND(AVG(salary) OVER (PARTITION BY department_id), 2) AS diff_from_dept_avg,
    COUNT(*) OVER (PARTITION BY department_id) AS dept_size
FROM employees
ORDER BY department_id, salary DESC;`},

{title:"ROW_NUMBER, RANK, DENSE_RANK",subtitle:"Ranking functions for ordering and deduplication",content:`
<div class="slide-body">
<h3>🏆 Ranking Functions Compared</h3>
<pre>Salary: 100K  90K  90K  80K  70K  70K  70K  60K

ROW_NUMBER:  1    2    3    4    5    6    7    8   (always unique)
RANK:        1    2    2    4    5    5    5    8   (gaps after ties)
DENSE_RANK:  1    2    2    3    4    4    4    5   (no gaps)</pre>

<table class="cmp-table">
<tr><th>Function</th><th>Ties?</th><th>Gaps?</th><th>Best For</th></tr>
<tr><td><code>ROW_NUMBER()</code></td><td>No ties (arbitrary)</td><td>Never</td><td>Pagination, deduplication</td></tr>
<tr><td><code>RANK()</code></td><td>Same rank for ties</td><td>Yes, after ties</td><td>Competition ranking</td></tr>
<tr><td><code>DENSE_RANK()</code></td><td>Same rank for ties</td><td>Never</td><td>Dense ranking, top-N</td></tr>
</table>

<h3>🎯 Top-N Per Group Pattern</h3>
<pre>-- Get top 2 earners per department:
SELECT * FROM (
    SELECT first_name, department_id, salary,
           ROW_NUMBER() OVER (
               PARTITION BY department_id 
               ORDER BY salary DESC
           ) AS rn
    FROM employees
) ranked
WHERE rn <= 2;</pre>

<h3>🧹 Deduplication Pattern</h3>
<pre>-- Keep only the latest order per customer:
SELECT * FROM (
    SELECT *, ROW_NUMBER() OVER (
        PARTITION BY customer_id ORDER BY order_date DESC
    ) AS rn
    FROM orders
) t WHERE rn = 1;</pre>
</div>`,sql:`-- Ranking functions comparison
SELECT 
    first_name || ' ' || last_name AS name,
    department_id AS dept,
    salary,
    ROW_NUMBER() OVER (ORDER BY salary DESC) AS row_num,
    RANK() OVER (ORDER BY salary DESC) AS rank,
    DENSE_RANK() OVER (ORDER BY salary DESC) AS dense_rank,
    ROW_NUMBER() OVER (
        PARTITION BY department_id ORDER BY salary DESC
    ) AS dept_rank
FROM employees
ORDER BY salary DESC;`},

{title:"LAG, LEAD, FIRST_VALUE, LAST_VALUE",subtitle:"Accessing other rows relative to the current row",content:`
<div class="slide-body">
<h3>⬅️ LAG — Previous Row Value</h3>
<pre>LAG(column, offset, default) OVER (ORDER BY ...)
-- offset: how many rows back (default: 1)
-- default: value if no previous row exists</pre>

<h3>➡️ LEAD — Next Row Value</h3>
<pre>LEAD(column, offset, default) OVER (ORDER BY ...)
-- Same as LAG but looks forward</pre>

<h3>🔝 FIRST_VALUE / LAST_VALUE</h3>
<pre>FIRST_VALUE(column) OVER (PARTITION BY ... ORDER BY ...)
-- Returns the first value in the window frame

LAST_VALUE(column) OVER (
    PARTITION BY ... ORDER BY ...
    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
)
-- ⚠️ Must specify frame! Default frame doesn't include future rows</pre>

<h3>📈 Practical Examples</h3>
<pre>-- Month-over-month growth:
SELECT month, revenue,
    revenue - LAG(revenue) OVER (ORDER BY month) AS growth,
    ROUND((revenue - LAG(revenue) OVER (ORDER BY month)) 
          / LAG(revenue) OVER (ORDER BY month) * 100, 1) AS growth_pct
FROM monthly_sales;

-- Gap analysis:
SELECT hire_date,
    JULIANDAY(hire_date) - JULIANDAY(LAG(hire_date) OVER (ORDER BY hire_date)) 
    AS days_since_last_hire
FROM employees;</pre>

<div class="info-box danger">
<div class="info-box-title">🚨 LAST_VALUE Default Frame Trap</div>
<p>The default window frame is <code>ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</code>. This means <code>LAST_VALUE()</code> just returns the current row's value! Always specify the full frame for LAST_VALUE.</p>
</div>
</div>`,sql:`-- LAG and LEAD: Compare employees to neighbors
SELECT 
    first_name,
    salary,
    LAG(salary, 1, 0) OVER (ORDER BY salary DESC) AS prev_higher_salary,
    LEAD(salary, 1, 0) OVER (ORDER BY salary DESC) AS next_lower_salary,
    salary - LEAD(salary, 1, salary) OVER (ORDER BY salary DESC) AS gap_to_next,
    FIRST_VALUE(first_name) OVER (ORDER BY salary DESC) AS highest_earner,
    FIRST_VALUE(salary) OVER (ORDER BY salary DESC) AS top_salary
FROM employees
ORDER BY salary DESC;`},

{title:"Window Frames & Running Totals",subtitle:"Controlling which rows the window function sees",content:`
<div class="slide-body">
<h3>📐 Window Frame Syntax</h3>
<pre>OVER (
    ORDER BY column
    ROWS BETWEEN start AND end    -- Physical rows
    -- or
    RANGE BETWEEN start AND end   -- Logical range
)

-- Frame boundaries:
UNBOUNDED PRECEDING    -- First row of partition
N PRECEDING            -- N rows before current
CURRENT ROW            -- Current row
N FOLLOWING            -- N rows after current
UNBOUNDED FOLLOWING    -- Last row of partition</pre>

<h3>📊 Common Patterns</h3>
<pre>-- Running total (cumulative sum):
SUM(amount) OVER (ORDER BY date ROWS UNBOUNDED PRECEDING)

-- Moving average (last 3 rows):
AVG(price) OVER (ORDER BY date ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)

-- Moving average (3-day window centered):
AVG(price) OVER (ORDER BY date ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING)

-- Percentage of total:
salary / SUM(salary) OVER () * 100 AS pct_of_total</pre>

<div class="info-box tip">
<div class="info-box-title">💡 ROWS vs RANGE</div>
<ul>
<li><code>ROWS</code>: Counts physical rows — predictable, fast</li>
<li><code>RANGE</code>: Groups rows with the same ORDER BY value — handles ties but slower</li>
<li><strong>Use ROWS</strong> unless you specifically need tie-handling behavior</li>
</ul>
</div>
</div>`,sql:`-- Running total and moving average of salaries
SELECT 
    first_name,
    salary,
    SUM(salary) OVER (ORDER BY salary DESC 
        ROWS UNBOUNDED PRECEDING) AS running_total,
    ROUND(AVG(salary) OVER (ORDER BY salary DESC 
        ROWS BETWEEN 2 PRECEDING AND CURRENT ROW), 2) AS moving_avg_3,
    ROUND(salary * 100.0 / SUM(salary) OVER (), 1) AS pct_of_total,
    ROUND(SUM(salary) OVER (ORDER BY salary DESC 
        ROWS UNBOUNDED PRECEDING) * 100.0 / SUM(salary) OVER (), 1) AS cumulative_pct
FROM employees
ORDER BY salary DESC;`}
]},

{name:"CASE Expression",icon:"🔀",color:"#4f46e5",slides:[
{title:"CASE — Conditional Logic in SQL",subtitle:"IF-THEN-ELSE for your queries",content:`
<div class="slide-body">
<h3>🔀 Two Forms of CASE</h3>

<h4>Simple CASE (equality comparison):</h4>
<pre>CASE department_id
    WHEN 1 THEN 'Engineering'
    WHEN 2 THEN 'Marketing'
    WHEN 3 THEN 'Sales'
    ELSE 'Other'
END</pre>

<h4>Searched CASE (any condition):</h4>
<pre>CASE 
    WHEN salary >= 100000 THEN 'Executive'
    WHEN salary >= 70000 THEN 'Senior'
    WHEN salary >= 40000 THEN 'Mid-Level'
    ELSE 'Junior'
END</pre>

<h3>📍 CASE in Different Contexts</h3>
<pre>-- In SELECT (computed column):
SELECT name, CASE WHEN price > 100 THEN 'Premium' ELSE 'Standard' END AS tier;

-- In WHERE:
SELECT * FROM employees WHERE 
    CASE WHEN department_id IS NULL THEN 'unassigned' ELSE 'assigned' END = 'unassigned';

-- In ORDER BY (custom sort order):
SELECT * FROM orders ORDER BY 
    CASE status WHEN 'urgent' THEN 1 WHEN 'normal' THEN 2 ELSE 3 END;

-- In UPDATE:
UPDATE employees SET salary = CASE 
    WHEN department_id = 1 THEN salary * 1.15
    WHEN department_id = 2 THEN salary * 1.10
    ELSE salary * 1.05
END;

-- In aggregate (conditional counting):
SELECT 
    COUNT(CASE WHEN status = 'active' THEN 1 END) AS active_count,
    COUNT(CASE WHEN status = 'inactive' THEN 1 END) AS inactive_count
FROM users;</pre>

<div class="info-box tip">
<div class="info-box-title">💡 CASE Evaluates Top-Down</div>
<p>CASE returns the first matching condition and stops. Order matters! Put more specific conditions before general ones.</p>
</div>
</div>`,sql:`-- CASE expression examples
SELECT 
    first_name || ' ' || last_name AS name,
    salary,
    CASE 
        WHEN salary >= 90000 THEN '🔴 Executive'
        WHEN salary >= 70000 THEN '🟠 Senior'
        WHEN salary >= 50000 THEN '🟡 Mid-Level'
        ELSE '🟢 Junior'
    END AS level,
    CASE 
        WHEN salary >= (SELECT AVG(salary) FROM employees) THEN '↑ Above Avg'
        ELSE '↓ Below Avg'
    END AS vs_average,
    department_id
FROM employees
ORDER BY salary DESC;`}
]},

{name:"Views",icon:"👁️",color:"#7c3aed",slides:[
{title:"Views & Materialized Views",subtitle:"Virtual tables and cached query results",content:`
<div class="slide-body">
<h3>👁️ Regular View — A Saved Query</h3>
<pre>CREATE VIEW employee_summary AS
SELECT 
    e.id, e.first_name || ' ' || e.last_name AS name,
    d.name AS department, e.salary
FROM employees e
JOIN departments d ON e.department_id = d.id;

-- Use it like a table:
SELECT * FROM employee_summary WHERE salary > 70000;

-- Drop it:
DROP VIEW employee_summary;</pre>

<h3>📦 Materialized View — Cached Results</h3>
<pre>-- PostgreSQL syntax (not available in SQLite):
CREATE MATERIALIZED VIEW monthly_revenue AS
SELECT DATE_TRUNC('month', order_date) AS month,
       SUM(total_price) AS revenue
FROM orders GROUP BY 1;

-- Must manually refresh:
REFRESH MATERIALIZED VIEW monthly_revenue;
REFRESH MATERIALIZED VIEW CONCURRENTLY monthly_revenue; -- No lock</pre>

<table class="cmp-table">
<tr><th>Feature</th><th>Regular View</th><th>Materialized View</th></tr>
<tr><td>Storage</td><td>No data stored (just SQL)</td><td>Results stored on disk</td></tr>
<tr><td>Speed</td><td>Re-executes query each time</td><td>Reads cached results</td></tr>
<tr><td>Freshness</td><td>Always current</td><td>Stale until refreshed</td></tr>
<tr><td>Write?</td><td>Sometimes (simple views)</td><td>No (read-only)</td></tr>
<tr><td>Use case</td><td>Abstraction, security</td><td>Performance, dashboards</td></tr>
</table>

<div class="pros-cons">
<div class="pros"><h4>✅ View Advantages</h4><ul>
<li>Simplify complex queries</li>
<li>Security: expose only certain columns</li>
<li>Abstraction: hide table structure changes</li>
<li>Reusability across applications</li>
</ul></div>
<div class="cons"><h4>❌ View Disadvantages</h4><ul>
<li>Performance: no inherent optimization</li>
<li>Complexity: nested views are hard to debug</li>
<li>Updatability: most views are read-only</li>
<li>Dependencies: dropping base tables breaks views</li>
</ul></div>
</div>
</div>`,sql:`-- Create and use a view
CREATE VIEW IF NOT EXISTS emp_department_view AS
SELECT 
    e.id,
    e.first_name || ' ' || e.last_name AS full_name,
    d.name AS department,
    d.location,
    e.salary,
    e.hire_date
FROM employees e
LEFT JOIN departments d ON e.department_id = d.id;

-- Query the view like a regular table:
SELECT department, 
       COUNT(*) AS count, 
       ROUND(AVG(salary), 2) AS avg_salary
FROM emp_department_view
GROUP BY department
ORDER BY avg_salary DESC;`}
]},

{name:"Indexes",icon:"⚡",color:"#06b6d4",slides:[
{title:"Indexes — Speeding Up Queries",subtitle:"The #1 performance optimization technique",content:`
<div class="slide-body">
<h3>⚡ What is an Index?</h3>
<p>An index is a data structure (usually B-tree) that speeds up data retrieval. Like a book's index — instead of reading every page, jump directly to the right one.</p>

<pre>-- Create an index:
CREATE INDEX idx_employees_dept ON employees(department_id);
CREATE INDEX idx_employees_salary ON employees(salary);

-- Composite index (multi-column):
CREATE INDEX idx_emp_dept_salary ON employees(department_id, salary);

-- Unique index:
CREATE UNIQUE INDEX idx_emp_email ON employees(email);

-- Drop an index:
DROP INDEX idx_employees_dept;</pre>

<h3>📊 Without Index vs With Index</h3>
<pre>-- Without index: Full Table Scan → O(n)
-- Reads every row to find matches
SELECT * FROM employees WHERE department_id = 3;
-- 1,000,000 rows → checks all 1,000,000

-- With index on department_id: Index Seek → O(log n)
-- B-tree lookup, then fetch matching rows
SELECT * FROM employees WHERE department_id = 3;
-- 1,000,000 rows → checks ~20 index levels → fetches ~100 matching rows</pre>

<h3>🌳 Types of Indexes</h3>
<table class="cmp-table">
<tr><th>Type</th><th>Structure</th><th>Best For</th></tr>
<tr><td><strong>B-tree</strong> (default)</td><td>Balanced tree</td><td>Equality, range queries, sorting</td></tr>
<tr><td><strong>Hash</strong></td><td>Hash table</td><td>Exact equality only (=)</td></tr>
<tr><td><strong>GIN</strong></td><td>Generalized Inverted</td><td>Full-text search, arrays, JSONB</td></tr>
<tr><td><strong>GiST</strong></td><td>Generalized Search Tree</td><td>Geometric data, ranges</td></tr>
<tr><td><strong>BRIN</strong></td><td>Block Range</td><td>Large sorted tables (timestamps)</td></tr>
</table>

<div class="pros-cons">
<div class="pros"><h4>✅ When to Index</h4><ul>
<li>Columns in WHERE clauses</li>
<li>Foreign key columns (JOIN conditions)</li>
<li>Columns in ORDER BY</li>
<li>Columns with high selectivity</li>
</ul></div>
<div class="cons"><h4>❌ When NOT to Index</h4><ul>
<li>Small tables (< 1000 rows)</li>
<li>Columns with low cardinality</li>
<li>Tables with heavy INSERT/UPDATE</li>
<li>Rarely queried columns</li>
</ul></div>
</div>
</div>`,sql:`-- Index demonstration in SQLite
-- Create indexes:
CREATE INDEX IF NOT EXISTS idx_emp_dept ON employees(department_id);
CREATE INDEX IF NOT EXISTS idx_emp_salary ON employees(salary);

-- See all indexes:
SELECT name, tbl_name 
FROM sqlite_master 
WHERE type = 'index'
ORDER BY tbl_name;

-- Query plan (shows if index is used):
-- EXPLAIN QUERY PLAN SELECT * FROM employees WHERE department_id = 1;`}
]},

{name:"Transactions & ACID",icon:"🔐",color:"#10b981",slides:[
{title:"ACID Properties & Transactions",subtitle:"Guaranteeing data integrity",content:`
<div class="slide-body">
<h3>🔐 ACID Properties</h3>
<table class="cmp-table">
<tr><th>Property</th><th>Meaning</th><th>Example</th></tr>
<tr><td><strong>A</strong>tomicity</td><td>All or nothing — entire transaction succeeds or fails</td><td>Bank transfer: debit AND credit both happen or neither does</td></tr>
<tr><td><strong>C</strong>onsistency</td><td>Database moves from one valid state to another</td><td>Constraints are satisfied after every transaction</td></tr>
<tr><td><strong>I</strong>solation</td><td>Concurrent transactions don't interfere</td><td>Two users updating the same row don't corrupt data</td></tr>
<tr><td><strong>D</strong>urability</td><td>Committed data survives system crashes</td><td>After COMMIT, data is written to disk</td></tr>
</table>

<h3>💳 Transaction Commands</h3>
<pre>BEGIN TRANSACTION;    -- Start transaction
    UPDATE accounts SET balance = balance - 500 WHERE id = 1;
    UPDATE accounts SET balance = balance + 500 WHERE id = 2;
COMMIT;               -- Save all changes

-- If something goes wrong:
BEGIN TRANSACTION;
    UPDATE accounts SET balance = balance - 500 WHERE id = 1;
    -- Oops! Error occurred
ROLLBACK;             -- Undo all changes since BEGIN

-- SAVEPOINT (partial rollback):
BEGIN;
    INSERT INTO orders (...) VALUES (...);
    SAVEPOINT sp1;
    INSERT INTO order_items (...) VALUES (...);  -- Fails
    ROLLBACK TO sp1;   -- Only undo the order_items insert
COMMIT;               -- The order is still saved</pre>

<h3>🔒 Isolation Levels</h3>
<table class="cmp-table">
<tr><th>Level</th><th>Dirty Read</th><th>Non-Repeatable Read</th><th>Phantom Read</th><th>Performance</th></tr>
<tr><td><code>READ UNCOMMITTED</code></td><td>Yes</td><td>Yes</td><td>Yes</td><td>⚡ Fastest</td></tr>
<tr><td><code>READ COMMITTED</code></td><td>No</td><td>Yes</td><td>Yes</td><td>🔵 Good</td></tr>
<tr><td><code>REPEATABLE READ</code></td><td>No</td><td>No</td><td>Yes</td><td>🟡 Moderate</td></tr>
<tr><td><code>SERIALIZABLE</code></td><td>No</td><td>No</td><td>No</td><td>🔴 Slowest</td></tr>
</table>

<div class="info-box tip">
<div class="info-box-title">💡 Default Isolation Levels</div>
<ul>
<li><strong>PostgreSQL</strong>: READ COMMITTED (best balance)</li>
<li><strong>MySQL (InnoDB)</strong>: REPEATABLE READ</li>
<li><strong>SQL Server</strong>: READ COMMITTED</li>
<li><strong>SQLite</strong>: SERIALIZABLE (single-writer)</li>
</ul>
</div>
</div>`,sql:`-- Transaction demo
BEGIN TRANSACTION;

-- Give everyone in department 1 a raise:
UPDATE employees SET salary = salary + 1000
WHERE department_id = 1;

-- Check the results before committing:
SELECT first_name, salary 
FROM employees WHERE department_id = 1;

-- Commit to save, or uncomment ROLLBACK to undo:
COMMIT;
-- ROLLBACK;`}
]},

{name:"Stored Procedures",icon:"⚙️",color:"#f59e0b",slides:[
{title:"Stored Procedures & Functions",subtitle:"Reusable server-side logic",content:`
<div class="slide-body">
<h3>⚙️ What are Stored Procedures?</h3>
<p>Pre-compiled SQL code stored in the database that can accept parameters, contain logic (IF/ELSE, loops), and be called by name.</p>

<pre>-- PostgreSQL syntax:
CREATE OR REPLACE FUNCTION give_raise(
    emp_id INT, 
    raise_pct DECIMAL
) RETURNS VOID AS $$
BEGIN
    UPDATE employees 
    SET salary = salary * (1 + raise_pct / 100)
    WHERE id = emp_id;
END;
$$ LANGUAGE plpgsql;

-- Call it:
SELECT give_raise(5, 10);  -- 10% raise for employee #5

-- MySQL syntax:
DELIMITER //
CREATE PROCEDURE give_raise(IN emp_id INT, IN raise_pct DECIMAL(5,2))
BEGIN
    UPDATE employees SET salary = salary * (1 + raise_pct / 100) WHERE id = emp_id;
END //
DELIMITER ;</pre>

<div class="pros-cons">
<div class="pros"><h4>✅ Pros of Stored Procedures</h4><ul>
<li>Reduced network traffic (logic on server)</li>
<li>Centralized business logic</li>
<li>Security (grant EXECUTE, not table access)</li>
<li>Pre-compiled for faster execution</li>
<li>Atomic operations</li>
</ul></div>
<div class="cons"><h4>❌ Cons of Stored Procedures</h4><ul>
<li>Vendor lock-in (not portable)</li>
<li>Harder to debug and test</li>
<li>Version control is difficult</li>
<li>Can become unmaintainable "spaghetti SQL"</li>
<li>Scaling requires DB server scaling</li>
</ul></div>
</div>

<div class="info-box warn">
<div class="info-box-title">⚠️ Modern Trend</div>
<p>Many teams are moving business logic from stored procedures to application code (microservices). Stored procedures are still valuable for complex data transformations, ETL, and operations that benefit from being close to the data.</p>
</div>
</div>`,sql:`-- SQLite doesn't support stored procedures natively,
-- but we can demonstrate the concept with a complex query
-- that would typically be a stored procedure:

-- "Procedure": Calculate department budget utilization
SELECT 
    d.name AS department,
    d.budget AS allocated_budget,
    SUM(e.salary) AS actual_payroll,
    ROUND(SUM(e.salary) / d.budget * 100, 1) || '%' AS utilization,
    CASE 
        WHEN SUM(e.salary) > d.budget THEN '🔴 Over Budget!'
        WHEN SUM(e.salary) > d.budget * 0.9 THEN '🟡 Near Limit'
        ELSE '🟢 Within Budget'
    END AS status
FROM departments d
LEFT JOIN employees e ON d.id = e.department_id
GROUP BY d.id, d.name, d.budget
ORDER BY utilization DESC;`}
]},

{name:"Triggers",icon:"🎯",color:"#ec4899",slides:[
{title:"Triggers — Automatic Actions",subtitle:"Execute code automatically on data changes",content:`
<div class="slide-body">
<h3>🎯 What are Triggers?</h3>
<p>Triggers are special procedures that automatically execute in response to specific events (INSERT, UPDATE, DELETE) on a table.</p>

<pre>-- SQLite trigger syntax:
CREATE TRIGGER log_salary_change
AFTER UPDATE OF salary ON employees
FOR EACH ROW
BEGIN
    INSERT INTO audit_log (table_name, action, old_value, new_value, changed_at)
    VALUES ('employees', 'SALARY_CHANGE', OLD.salary, NEW.salary, datetime('now'));
END;

-- PostgreSQL syntax:
CREATE OR REPLACE FUNCTION log_salary_trigger()
RETURNS TRIGGER AS $$
BEGIN
    INSERT INTO audit_log VALUES (OLD.salary, NEW.salary, NOW());
    RETURN NEW;
END;
$$ LANGUAGE plpgsql;

CREATE TRIGGER salary_audit
AFTER UPDATE ON employees
FOR EACH ROW
WHEN (OLD.salary IS DISTINCT FROM NEW.salary)
EXECUTE FUNCTION log_salary_trigger();</pre>

<h3>⏰ Trigger Timing</h3>
<table class="cmp-table">
<tr><th>Timing</th><th>When</th><th>Use Case</th></tr>
<tr><td><code>BEFORE</code></td><td>Before the operation</td><td>Validation, auto-fill fields</td></tr>
<tr><td><code>AFTER</code></td><td>After the operation</td><td>Audit logging, notifications</td></tr>
<tr><td><code>INSTEAD OF</code></td><td>Replaces the operation</td><td>Updatable views</td></tr>
</table>

<div class="pros-cons">
<div class="pros"><h4>✅ When to Use Triggers</h4><ul>
<li>Audit logging / change tracking</li>
<li>Auto-updating timestamps (updated_at)</li>
<li>Maintaining derived/summary tables</li>
<li>Enforcing complex business rules</li>
</ul></div>
<div class="cons"><h4>❌ When NOT to Use Triggers</h4><ul>
<li>Complex business logic (use app code)</li>
<li>Cascading triggers (trigger chains = nightmares)</li>
<li>Performance-critical bulk operations</li>
<li>Logic that should be visible to developers</li>
</ul></div>
</div>

<div class="info-box danger">
<div class="info-box-title">🚨 Trigger Dangers</div>
<p>Triggers are "invisible" — they run without explicit calls. This makes debugging extremely difficult. A simple UPDATE can trigger a cascade of hidden actions. Use sparingly and document thoroughly.</p>
</div>
</div>`,sql:`-- Create an audit log table and trigger
CREATE TABLE IF NOT EXISTS audit_log (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    table_name TEXT,
    action TEXT,
    details TEXT,
    changed_at TEXT DEFAULT (datetime('now'))
);

-- Create a trigger for employee salary changes
CREATE TRIGGER IF NOT EXISTS trg_salary_audit
AFTER UPDATE OF salary ON employees
FOR EACH ROW
BEGIN
    INSERT INTO audit_log (table_name, action, details)
    VALUES ('employees', 'SALARY_UPDATE', 
            OLD.first_name || ': $' || OLD.salary || ' → $' || NEW.salary);
END;

-- Test it: Update a salary
UPDATE employees SET salary = salary + 5000 WHERE id = 1;

-- Check the audit log:
SELECT * FROM audit_log ORDER BY id DESC;`}
]},

{name:"Normalization",icon:"📐",color:"#ef4444",slides:[
{title:"Database Normalization",subtitle:"Organizing data to eliminate redundancy",content:`
<div class="slide-body">
<h3>📐 What is Normalization?</h3>
<p>The process of organizing database tables to minimize data redundancy and dependency. Each normal form builds on the previous one.</p>

<h3>1️⃣ First Normal Form (1NF)</h3>
<ul>
<li>Each cell contains a <strong>single atomic value</strong> (no lists, no comma-separated values)</li>
<li>Each column contains values of the <strong>same type</strong></li>
<li>Each row is <strong>uniquely identifiable</strong> (has a primary key)</li>
</ul>
<pre>-- ❌ Violates 1NF (multi-valued column):
| student | courses           |
|---------|-------------------|
| Alice   | Math, Physics     |  ← Multiple values!

-- ✅ 1NF:
| student | course  |
|---------|---------|
| Alice   | Math    |
| Alice   | Physics |</pre>

<h3>2️⃣ Second Normal Form (2NF)</h3>
<ul>
<li>Must be in 1NF</li>
<li>No <strong>partial dependencies</strong>: non-key columns must depend on the ENTIRE primary key</li>
</ul>
<pre>-- ❌ Violates 2NF (student_name depends only on student_id, not course):
PK = (student_id, course_id)
| student_id | course_id | student_name | grade |
-- student_name depends on student_id alone!

-- ✅ 2NF: Split into two tables
students(student_id, student_name)
enrollments(student_id, course_id, grade)</pre>

<h3>3️⃣ Third Normal Form (3NF)</h3>
<ul>
<li>Must be in 2NF</li>
<li>No <strong>transitive dependencies</strong>: non-key columns can't depend on other non-key columns</li>
</ul>
<pre>-- ❌ Violates 3NF (city depends on zip_code, not on PK directly):
| emp_id | zip_code | city     |  ← city depends on zip_code

-- ✅ 3NF:
employees(emp_id, zip_code)
locations(zip_code, city)</pre>

<div class="info-box warn">
<div class="info-box-title">⚠️ Denormalization</div>
<p>Sometimes you intentionally denormalize for performance. Read-heavy applications (dashboards, reports) benefit from pre-joined data. It's a trade-off: <strong>faster reads vs slower writes + potential inconsistency</strong>.</p>
</div>
</div>`,sql:`-- Our database is already normalized! Let's verify:
-- Employees don't store department names (that's in departments table)
-- Employee-Project relationship is in a separate junction table

-- This shows proper normalization:
SELECT 'employees columns:' AS info;
PRAGMA table_info(employees);

-- The junction table (many-to-many):
-- SELECT 'employee_projects columns:' AS info;
-- PRAGMA table_info(employee_projects);`}
]},

{name:"String & Date Functions",icon:"🔧",color:"#4f46e5",slides:[
{title:"Essential SQL Functions",subtitle:"String manipulation and date operations",content:`
<div class="slide-body">
<h3>📝 String Functions</h3>
<table class="cmp-table">
<tr><th>Function</th><th>Example</th><th>Result</th></tr>
<tr><td><code>UPPER(s)</code></td><td>UPPER('hello')</td><td>HELLO</td></tr>
<tr><td><code>LOWER(s)</code></td><td>LOWER('HELLO')</td><td>hello</td></tr>
<tr><td><code>LENGTH(s)</code></td><td>LENGTH('hello')</td><td>5</td></tr>
<tr><td><code>SUBSTR(s,start,len)</code></td><td>SUBSTR('hello',2,3)</td><td>ell</td></tr>
<tr><td><code>REPLACE(s,old,new)</code></td><td>REPLACE('hello','l','r')</td><td>herro</td></tr>
<tr><td><code>TRIM(s)</code></td><td>TRIM('  hi  ')</td><td>hi</td></tr>
<tr><td><code>LTRIM/RTRIM</code></td><td>LTRIM('  hi')</td><td>hi</td></tr>
<tr><td><code>INSTR(s,sub)</code></td><td>INSTR('hello','ll')</td><td>3</td></tr>
<tr><td><code>||</code> (concat)</td><td>'a' || 'b'</td><td>ab</td></tr>
</table>

<h3>📅 Date Functions (SQLite)</h3>
<table class="cmp-table">
<tr><th>Function</th><th>Example</th><th>Result</th></tr>
<tr><td><code>DATE('now')</code></td><td>DATE('now')</td><td>2024-01-15</td></tr>
<tr><td><code>TIME('now')</code></td><td>TIME('now')</td><td>14:30:00</td></tr>
<tr><td><code>DATETIME('now')</code></td><td>DATETIME('now')</td><td>2024-01-15 14:30:00</td></tr>
<tr><td><code>STRFTIME(fmt, date)</code></td><td>STRFTIME('%Y', '2024-01-15')</td><td>2024</td></tr>
<tr><td><code>JULIANDAY(date)</code></td><td>JULIANDAY('now') - JULIANDAY(date)</td><td>Days between</td></tr>
</table>

<h3>🔄 Type Casting</h3>
<pre>CAST(value AS type)     -- Standard SQL
-- Examples:
CAST('42' AS INTEGER)   -- String to number
CAST(42 AS TEXT)         -- Number to string
CAST(3.14 AS INTEGER)   -- Truncates to 3</pre>

<div class="info-box tip">
<div class="info-box-title">💡 Date Functions Vary by Database</div>
<p>Date functions are the LEAST standardized across databases. PostgreSQL uses <code>DATE_TRUNC</code>, MySQL uses <code>DATE_FORMAT</code>, SQL Server uses <code>DATEPART</code>. Always check your specific database's documentation.</p>
</div>
</div>`,sql:`-- String and date function playground
SELECT 
    first_name,
    UPPER(first_name) AS upper_name,
    LENGTH(first_name) AS name_len,
    SUBSTR(email, INSTR(email, '@') + 1) AS email_domain,
    hire_date,
    STRFTIME('%Y', hire_date) AS hire_year,
    STRFTIME('%m', hire_date) AS hire_month,
    CAST(JULIANDAY('now') - JULIANDAY(hire_date) AS INT) AS days_employed,
    REPLACE(email, '@', ' [at] ') AS safe_email
FROM employees
ORDER BY hire_date
LIMIT 8;`}
]},

{name:"Partitioning & Sharding",icon:"📦",color:"#6366f1",slides:[
{title:"Horizontal Partitioning & Sharding",subtitle:"Scaling tables beyond single-disk limits",content:`
<div class="slide-body">
<h3>Why Partition?</h3>
<p>When a table grows past millions of rows, scanning indexes or running maintenance (<code>VACUUM</code>, backups) on a single massive file becomes a bottleneck. <strong>Partitioning</strong> splits the table physically into smaller child tables while keeping a unified logical table interface.</p>

<h3>Partitioning Strategies</h3>
<ul>
<li><strong>Range Partitioning:</strong> Split by date or numeric interval (e.g., <code>orders_2026_q1</code>, <code>orders_2026_q2</code>).</li>
<li><strong>List Partitioning:</strong> Split by explicit category values (e.g., <code>users_na</code>, <code>users_eu</code>).</li>
<li><strong>Hash Partitioning:</strong> Modulo hash of ID across N buckets for even write balancing.</li>
</ul>

<div class="info-box tip">
<div class="info-box-title">💡 Partition Pruning</div>
<p>When your query filters by the partition key (<code>WHERE order_date >= '2026-04-01'</code>), the optimizer skips checking irrelevant partition tables entirely!</p>
</div>
</div>`,sql:`-- Simulating declarative partition querying via UNION ALL:
SELECT 'Q1 Partition' AS source_table, COUNT(*) AS row_count, AVG(total_price) AS avg_order
FROM orders WHERE order_date < '2023-07-01'
UNION ALL
SELECT 'Q2 Partition' AS source_table, COUNT(*) AS row_count, AVG(total_price) AS avg_order
FROM orders WHERE order_date >= '2023-07-01';`}
]},

{name:"Concurrency & MVCC",icon:"⚡",color:"#10b981",slides:[
{title:"Multi-Version Concurrency Control",subtitle:"High concurrency without read/write locking contention",content:`
<div class="slide-body">
<h3>The Core Philosophy of MVCC</h3>
<p>In traditional locking databases, a writing transaction locks the table or row, forcing all reading queries to wait. Under <strong>MVCC (PostgreSQL, MySQL InnoDB, Oracle)</strong>:</p>
<div class="info-box tip">
<div class="info-box-title">🌟 Golden Rule of MVCC</div>
<p><strong>Readers NEVER block Writers, and Writers NEVER block Readers!</strong></p>
</div>

<h3>How It Works</h3>
<ol>
<li>When a row is updated, the engine writes a <strong>new version</strong> of the row stamped with the current transaction ID (<code>xmin</code> / <code>xmax</code>).</li>
<li>Concurrent readers see a historical snapshot valid at the exact millisecond their transaction started.</li>
<li>Dead historical row versions are periodically swept up by background garbage collectors (<code>VACUUM</code> in PostgreSQL).</li>
</ol>
</div>`,sql:`-- Inspecting active transaction simulation and row states:
SELECT id, name, budget, 
       'v1.0 (Active Snapshot)' AS mvcc_version_state
FROM departments
WHERE budget > 800000;`}
]},

{name:"JSON & NoSQL in SQL",icon:"📄",color:"#f59e0b",slides:[
{title:"Querying Semi-Structured JSON",subtitle:"Combining relational integrity with document flexibility",content:`
<div class="slide-body">
<h3>Why Hybrid Relational + JSON?</h3>
<p>Use rigid SQL tables for core structured entities (Users, Payments) and use <strong>JSON/JSONB columns</strong> for dynamic user attributes, custom product specs, or webhook payloads.</p>

<h3>JSON Functions in SQL</h3>
<pre>-- Extract JSON scalar values:
SELECT json_extract(attributes, '$.theme') FROM user_settings;

-- PostgreSQL JSONB native operator:
SELECT metadata->>'role' FROM users WHERE metadata@>'{"verified": true}';</pre>

<div class="info-box tip">
<div class="info-box-title">⚡ Inverted GIN Indexing</div>
<p>You can create specialized indexes directly on JSON paths (<code>CREATE INDEX idx_json ON users USING GIN (metadata)</code>), giving sub-millisecond document lookups inside your relational engine!</p>
</div>
</div>`,sql:`-- SQLite JSON extraction demo:
SELECT id, name,
       json_object('category', category, 'in_stock', stock > 0, 'price_tier', CASE WHEN price > 200 THEN 'Premium' ELSE 'Standard' END) AS generated_json_doc
FROM products
LIMIT 5;`}
]},

{name:"Security & Row-Level Security",icon:"🛡️",color:"#ec4899",slides:[
{title:"Data Access Control & Tenant Isolation",subtitle:"Enforcing security policies inside the database engine",content:`
<div class="slide-body">
<h3>DCL — Data Control Language</h3>
<pre>GRANT SELECT, INSERT ON orders TO analytics_service;
REVOKE DELETE ON orders FROM analytics_service;</pre>

<h3>Row-Level Security (RLS) ⭐</h3>
<p>In multi-tenant SaaS applications, preventing data leaks across customers is paramount. Instead of relying purely on application WHERE clauses (<code>WHERE tenant_id = 42</code>), <strong>Row-Level Security</strong> enforces policies directly inside the query execution engine.</p>

<pre>ALTER TABLE tenant_orders ENABLE ROW LEVEL SECURITY;

CREATE POLICY tenant_isolation_policy ON tenant_orders
USING (tenant_id = current_setting('app.current_tenant_id')::uuid);</pre>
<p>Even if an engineer executes <code>SELECT * FROM tenant_orders</code>, the database automatically appends the tenant filter!</p>
</div>`,sql:`-- Simulating Row-Level Security (RLS) filtering:
-- Imagine session tenant_id is set to Customer #1 (TechCorp):
SELECT o.id AS order_id, c.name AS tenant_name, p.name AS product, o.total_price
FROM orders o

<div class="slide-body">
<h3>Write-Ahead Logging (WAL)</h3>
<p>To ensure ACID Durability without incurring massive disk random I/O overhead on every transaction commit, engines sequentially append changes to a rapid <strong>Write-Ahead Log (WAL)</strong> before updating physical data pages.</p>

<h3>Point-In-Time Recovery (PITR)</h3>
<p>By taking weekly base disk snapshots and continuously archiving WAL stream files, DBAs can replay transactions up to any exact second in time—allowing full recovery even if someone runs <code>DROP TABLE</code> at 2:14:05 PM!</p>

<h3>Read Replicas & High Availability</h3>
<p>Primary servers stream WAL logs to N Read Replicas. All write queries (<code>INSERT/UPDATE</code>) route to Primary, while heavy read queries (<code>SELECT</code>) load-balance across Replicas.</p>
</div>`,sql:`-- Simulating Database Diagnostics & Table Status:
SELECT 'employees' AS table_name, COUNT(*) AS total_rows, 'Healthy (Replicated)' AS status FROM employees
UNION ALL
SELECT 'orders' AS table_name, COUNT(*) AS total_rows, 'Healthy (Replicated)' AS status FROM orders
UNION ALL
SELECT 'products' AS table_name, COUNT(*) AS total_rows, 'Healthy (Replicated)' AS status FROM products;`}
]}
];

// ──────────────────────────────────────────────
// APP STATE
// ──────────────────────────────────────────────
let db = null;
let currentSlideIndex = 0;
let allSlides = [];

// Flatten slides
chapters.forEach((ch, ci) => {
    ch.slides.forEach((sl, si) => {
        allSlides.push({ ...sl, chapterIndex: ci, slideIndexInChapter: si, chapter: ch.name, chapterIcon: ch.icon, chapterColor: ch.color });
    });
});

// ──────────────────────────────────────────────
// INITIALIZE
// ──────────────────────────────────────────────
async function init() {
    // Init SQL.js
    const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}` });
    db = new SQL.Database();
    db.run(SETUP_SQL);

    buildSidebar();
    renderSlide(0);
    
    // Keyboard navigation
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'TEXTAREA') {
            if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runSQL(); }
            return;
        }
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextSlide(); }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
    });
}

function resetDB() {
    const SQL = db.constructor;
    db.close();
    db = new SQL.Database();
    db.run(SETUP_SQL);
    document.getElementById('outputArea').innerHTML = '<div class="result-success">✅ Database reset to original state.</div>';
}

// ──────────────────────────────────────────────
// SIDEBAR
// ──────────────────────────────────────────────
function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    let globalIdx = 0;
    nav.innerHTML = chapters.map((ch, ci) => {
        const slidesHtml = ch.slides.map((sl, si) => {
            const idx = globalIdx++;
            return `<div class="slide-link" data-idx="${idx}" onclick="goToSlide(${idx})">${sl.title}</div>`;
        }).join('');
        return `<div class="chapter-group" data-chapter="${ci}">
            <button class="chapter-btn" onclick="toggleChapter(${ci})">
                <span class="chapter-num">${ci + 1}</span>
                <span>${ch.icon} ${ch.name}</span>
            </button>
            <div class="chapter-slides">${slidesHtml}</div>
        </div>`;
    }).join('');
}

function toggleChapter(ci) {
    const group = document.querySelector(`.chapter-group[data-chapter="${ci}"]`);
    group.classList.toggle('open');
}

function updateSidebar() {
    const slide = allSlides[currentSlideIndex];
    document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.slide-link').forEach(link => link.classList.remove('active'));
    
    const chapterGroup = document.querySelector(`.chapter-group[data-chapter="${slide.chapterIndex}"]`);
    if (chapterGroup) {
        chapterGroup.classList.add('open');
        chapterGroup.querySelector('.chapter-btn').classList.add('active');
    }
    
    const slideLink = document.querySelector(`.slide-link[data-idx="${currentSlideIndex}"]`);
    if (slideLink) {
        slideLink.classList.add('active');
        slideLink.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// ──────────────────────────────────────────────
// SLIDE RENDERING
// ──────────────────────────────────────────────
function renderSlide(idx) {
    if (idx < 0 || idx >= allSlides.length) return;
    currentSlideIndex = idx;
    const slide = allSlides[idx];
    
    const content = document.getElementById('slideContent');
    content.classList.remove('animate');
    void content.offsetWidth; // Force reflow
    content.classList.add('animate');
    
    content.innerHTML = `
        <div class="slide-chapter-label" style="color:${slide.chapterColor}">${slide.chapterIcon} Chapter ${slide.chapterIndex + 1}: ${slide.chapter}</div>
        <div class="slide-title">${slide.title}</div>
        <div class="slide-subtitle">${slide.subtitle}</div>
        ${slide.content}
    `;
    
    // Set SQL editor
    document.getElementById('sqlInput').value = slide.sql;
    document.getElementById('outputArea').innerHTML = '<div class="result-message">▶ Click "Run" or press Ctrl+Enter to execute the query.</div>';
    document.getElementById('execInfo').textContent = '';
    
    // Update controls
    document.getElementById('slideCounter').textContent = `${idx + 1} / ${allSlides.length}`;
    document.getElementById('prevBtn').disabled = idx === 0;
    document.getElementById('nextBtn').disabled = idx === allSlides.length - 1;
    document.getElementById('progressFill').style.width = `${((idx + 1) / allSlides.length) * 100}%`;
    
    updateSidebar();
    content.scrollTop = 0;
}

function nextSlide() { renderSlide(currentSlideIndex + 1); }
function prevSlide() { renderSlide(currentSlideIndex - 1); }
function goToSlide(idx) { renderSlide(idx); }

// ──────────────────────────────────────────────
// SQL EXECUTION
// ──────────────────────────────────────────────
function runSQL() {
    const sql = document.getElementById('sqlInput').value.trim();
    if (!sql) return;
    
    const outputArea = document.getElementById('outputArea');
    const execInfo = document.getElementById('execInfo');
    
    const startTime = performance.now();
    
    try {
        const results = db.exec(sql);
        const elapsed = (performance.now() - startTime).toFixed(1);
        
        if (results.length === 0) {
            // Statement executed but returned no results (INSERT, UPDATE, DELETE, CREATE)
            const changes = db.getRowsModified();
            outputArea.innerHTML = `<div class="result-success">✅ Query executed successfully.</div>`;
            execInfo.innerHTML = `<span class="rows-affected">${changes} row(s) affected</span> · <span class="exec-time">${elapsed}ms</span>`;
        } else {
            // Display all result sets
            let html = '';
            results.forEach((result, ri) => {
                html += `<table class="result-table">
                    <thead><tr>${result.columns.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr></thead>
                    <tbody>${result.values.map(row => 
                        `<tr>${row.map(val => `<td>${val === null ? '<span style="color:var(--text3);font-style:italic">NULL</span>' : escHtml(String(val))}</td>`).join('')}</tr>`
                    ).join('')}</tbody>
                </table>`;
            });
            outputArea.innerHTML = html;
            const totalRows = results.reduce((sum, r) => sum + r.values.length, 0);
            execInfo.innerHTML = `<span class="rows-affected">${totalRows} row(s) returned</span> · <span class="exec-time">${elapsed}ms</span>`;
        }
    } catch (err) {
        const elapsed = (performance.now() - startTime).toFixed(1);
        outputArea.innerHTML = `<div class="result-error">❌ Error: ${escHtml(err.message)}</div>`;
        execInfo.innerHTML = `<span class="exec-time">${elapsed}ms</span>`;
    }
}

function escHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}

// Start
init();
</script>
