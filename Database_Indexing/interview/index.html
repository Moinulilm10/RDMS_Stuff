<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 4: Senior Interview Q&A (Indexing)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070a12;
            --bg-card: #111726;
            --bg-hover: #1a233a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.2);
            --cyan: #06b6d4;
            --purple: #a855f7;
            --border: rgba(255, 255, 255, 0.08);
            --tag-bg: rgba(34, 197, 94, 0.15);
            --tag-text: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 4rem 2rem;
            background-image: radial-gradient(at 50% 0%, rgba(34, 197, 94, 0.08) 0px, transparent 60%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--cyan);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            transition: all 0.2s;
        }
        .nav-back:hover { transform: translateX(-4px); color: #fff; }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .badge {
            display: inline-flex;

            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.8rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #4ade80 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .search-bar {
            width: 100%;
            padding: 1.25rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
            margin-bottom: 2.5rem;
            outline: none;
            transition: all 0.2s;
        }
        .search-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .qa-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .qa-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .qa-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; width: 4px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .qa-card:hover { border-color: rgba(255,255,255,0.2); }
        .qa-card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .q-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--border);
            line-height: 1;
        }

        .qa-card h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
        }

        .tag-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            margin-left: 2.5rem;
        }

        .tag {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
        }

        .tag.tag-planner { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        .tag.tag-btree { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .tag.tag-adv { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.3); }
        .tag.tag-perf { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }

        .answer-content {
            margin-left: 2.5rem;
            color: #cbd5e1;
            font-size: 1rem;
            line-height: 1.7;
        }

        .answer-content p { margin-bottom: 1rem; }
        .answer-content ul { margin: 0 0 1rem 1.5rem; }
        .answer-content li { margin-bottom: 0.5rem; }
        
        .answer-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            background: rgba(255,255,255,0.08);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            color: #fff;
        }

        .recruiter-box {
            margin-top: 2rem;
            background: rgba(168, 85, 247, 0.05);
            border-left: 4px solid var(--purple);
            border-radius: 0 12px 12px 0;
            padding: 1.5rem;
        }

        .recruiter-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--purple);
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .recruiter-text {
            color: #e2e8f0;
            font-size: 0.95rem;
            font-style: italic;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .qa-card { padding: 1.5rem; }
            .card-header { flex-direction: column; gap: 0.5rem; }
            .tag-row, .answer-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="../index.html" class="nav-back">← Back to Indexing Hub</a>

        <header>
            <div class="badge">Staff & Principal Engineer Prep</div>
            <h1>Index Architecture Q&A</h1>
            <p class="subtitle">Search 25+ real-world interview questions covering Cost-Based Optimizers, GIN vs B-Tree tradeoffs, and Query Planner logic.</p>
        </header>

        <input type="text" class="search-bar" id="searchInput" placeholder="Search for 'GIN', 'Bitmap Scan', 'Selectivity'...">

        <div class="qa-list" id="qaList">
            <!-- Populated via JS -->
        </div>
    </div>

<script>
const qaData = [
{
    num: "01",
    title: "In PostgreSQL, you have an index on the <code>status</code> column, but <code>EXPLAIN ANALYZE</code> shows the engine is executing a <code>Seq Scan</code> instead of an <code>Index Scan</code>. Why would the Cost-Based Optimizer deliberately ignore your index?",
    category: "PLANNER",
    tagText: "Selectivity & CBO",
    content: `
        <p>The Cost-Based Optimizer (CBO) decides query execution paths based on statistical <strong>Selectivity</strong>. An index is only useful if it helps narrow down the dataset significantly (usually targeting less than 15-20% of the table rows).</p>
        <ul>
            <li><strong>Low Selectivity (The Tipping Point):</strong> If a column has low cardinality (e.g., <code>status = 'active'</code> which accounts for 60% of all rows), the CBO calculates the cost of I/O. Using an index requires traversing the B-Tree, finding the physical Row ID, and then performing a <strong>random disk seek</strong> to the table heap for every single matched row.</li>
            <li><strong>Sequential Scan Superiority:</strong> Doing 6 million random disk seeks is astronomically slower than simply reading the 10 million-row table from start to finish via a Sequential Scan (sequential disk reads are heavily optimized by OS read-ahead caches).</li>
        </ul>
        <p>The optimizer knows that falling back to a Seq Scan is mathematically cheaper than thrashing the disk head with random I/O for a low-selectivity query.</p>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters & Hiring Managers</div>
            <div class="recruiter-text">
                "When discussing performance tuning in Staff interviews, I explain that 'just adding an index' is a junior response. I highlight my understanding of the <strong>Cost-Based Optimizer's selectivity thresholds</strong>. I explain how I analyze <code>pg_stats</code> histograms to determine if an index will actually be used, and how I prevented our engineering team from adding useless, low-cardinality indexes that would only incur a write penalty without improving read performance."
            </div>
        </div>
    `
},
{
    num: "02",
    title: "Explain the difference between an <code>Index Scan</code>, an <code>Index-Only Scan</code>, and a <code>Bitmap Scan</code>. When does the engine choose a Bitmap Scan?",
    category: "PLANNER",
    tagText: "Execution Plans",
    content: `
        <ul>
            <li><strong>Index Scan:</strong> The engine traverses the B+ Tree, finds the leaf node, extracts the Row Pointer, and immediately visits the physical table heap to fetch the rest of the row's columns.</li>
            <li><strong>Index-Only Scan:</strong> The engine traverses the index and realizes that <em>all the columns requested by the SELECT clause are already stored inside the index leaf node</em> (a Covering Index). It never touches the physical table heap, skipping massive amounts of I/O.</li>
            <li><strong>Bitmap Scan (Bitmap Index Scan + Bitmap Heap Scan):</strong> When a query has multiple filters (<code>WHERE cat = 1 AND sub_cat = 2</code>) with separate indexes, the engine cannot use both B-Trees at once normally. Instead, it scans Index A and builds a bitmap in RAM. It scans Index B and builds a second bitmap. It performs a bitwise AND between them. Finally, it sorts the remaining Row IDs to convert what would be random I/O into a smooth, sequential sweep across the physical heap!</li>
        </ul>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters & Hiring Managers</div>
            <div class="recruiter-text">
                "I use my deep understanding of query planner internals to <strong>reduce cloud infrastructure costs</strong>. I tell hiring managers how I analyzed execution plans and converted expensive Heap Fetches into Index-Only Scans by adding <code>INCLUDE</code> columns to our B-Trees, dropping our database CPU utilization by 40% and eliminating the need for an expensive hardware upgrade."
            </div>
        </div>
    `
},
{
    num: "03",
    title: "Why are GIN (Generalized Inverted Index) indexes required for <code>JSONB</code> and Array columns in PostgreSQL? Why can't we use a standard B-Tree?",
    category: "ADV",
    tagText: "Advanced Structures",
    content: `
        <p>A standard B+ Tree indexes the <em>entire value</em> as a single comparable entity. It can determine if <code>String A == String B</code>, or if <code>Number A > Number B</code>. However, a B-Tree has no concept of "Does this array <em>contain</em> this value?" or "Does this JSON blob possess this specific key-value pair?"</p>
        <p>A <strong>GIN (Generalized Inverted Index)</strong> is designed for multi-value data types. It works like the index at the back of a textbook:</p>
        <ul>
            <li>Instead of indexing the entire document as one entry, GIN extracts <strong>every individual word, array element, or JSON key-value pair</strong> and indexes them separately.</li>
            <li>Each element in the GIN index points to a list of physical Row IDs that contain that element.</li>
            <li>When you query <code>WHERE json_data @> '{"status": "active"}'</code>, the engine instantly looks up the key <code>"status": "active"</code> in the inverted index and retrieves all matching rows.</li>
        </ul>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters & Hiring Managers</div>
            <div class="recruiter-text">
                "In interviews for architecture roles, I discuss the tradeoffs of schema-less JSON designs. While JSONB provides agility, I emphasize the <strong>Write Amplification penalty of GIN indexes</strong>. Because GIN extracts every key-value pair, inserting one JSON document might trigger 50 index updates! I explain how I balance read flexibility with write throughput, ensuring our NoSQL-in-SQL designs don't bottleneck our ingestion pipelines."
            </div>
        </div>
    `
},
{
    num: "04",
    title: "What is the 'Write Tax' (Index Maintenance)? If a table has 15 indexes, what is the architectural impact of executing a single <code>INSERT</code> statement?",
    category: "PERF",
    tagText: "Write Amplification",
    content: `
        <p>Indexes drastically accelerate read queries, but they physically penalize every write operation (INSERT, UPDATE, DELETE). This is known as the <strong>Write Tax</strong> or Write Amplification.</p>
        <ul>
            <li>When an <code>INSERT</code> occurs, the database writes the new row payload to the physical table heap (1 disk operation).</li>
            <li>Then, the engine must synchronously update <em>every single index</em> attached to that table to maintain consistency. If there are 15 indexes, it must traverse 15 different B+ Trees and write the new Row ID into 15 different leaf nodes!</li>
            <li>This turns a single logical write into <strong>16 physical random disk writes</strong>, causing massive locking, buffer pool cache eviction, and I/O latency.</li>
        </ul>
        <p>Additionally, <code>UPDATE</code> statements are particularly brutal. If an UPDATE modifies a column that is part of an index, the engine must delete the old index entry and insert a new one.</p>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters & Hiring Managers</div>
            <div class="recruiter-text">
                "I bring up the 'Write Tax' to demonstrate my holistic view of system architecture. I tell hiring managers how I audited a legacy database experiencing severe write latency. By identifying and dropping 10 unused or overlapping indexes, I instantly increased our write throughput by 300% without altering a single line of application code. I emphasize that <strong>the best index is often the one you delete</strong>."
            </div>
        </div>
    `
},
{
    num: "05",
    title: "Explain the Leftmost Prefix Rule in Composite Indexes. If I have an index on <code>(state, city, zipcode)</code>, which queries will use the index and which will trigger a Full Table Scan?",
    category: "BTREE",
    tagText: "Composite Indexes",
    content: `
        <p>A B+ Tree composite index sorts data hierarchically, exactly like a telephone book (sorted by Last Name, then First Name). The <strong>Leftmost Prefix Rule</strong> dictates that the database can only traverse the tree if the query provides the columns sequentially from left to right.</p>
        <ul>
            <li><code>WHERE state = 'NY'</code> ➔ <strong>Uses Index.</strong> The engine seeks 'NY' at the top level.</li>
            <li><code>WHERE state = 'NY' AND city = 'Buffalo'</code> ➔ <strong>Uses Index.</strong> The engine seeks 'NY', then narrows down to 'Buffalo'.</li>
            <li><code>WHERE state = 'NY' AND zipcode = '14201'</code> ➔ <strong>Partial Index Use.</strong> It uses the index to find 'NY', but because <code>city</code> is missing, it cannot use the index to find the zip code. It must scan all of NY.</li>
            <li><code>WHERE city = 'Buffalo'</code> ➔ <strong>FULL TABLE SCAN.</strong> Because the query lacks the leftmost column (<code>state</code>), the engine doesn't know where to start searching! Buffalos could be scattered across all 50 states in the index tree!</li>
        </ul>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters & Hiring Managers</div>
            <div class="recruiter-text">
                "I use the Leftmost Prefix Rule to showcase my ability to design highly optimized, lean schemas. I explain how I consolidated 5 separate single-column indexes into 2 strategically ordered composite indexes, saving gigabytes of RAM and reducing write overhead, while ensuring all our critical access patterns still achieved $O(log N)$ lookup speeds."
            </div>
        </div>
    `
}
];

function renderQA(searchTerm = '') {
    const list = document.getElementById('qaList');
    list.innerHTML = '';
    
    const lowerSearch = searchTerm.toLowerCase();
    
    const filtered = qaData.filter(qa => 
        qa.title.toLowerCase().includes(lowerSearch) || 
        qa.content.toLowerCase().includes(lowerSearch) ||
        qa.tagText.toLowerCase().includes(lowerSearch)
    );

    if (filtered.length === 0) {
        list.innerHTML = `<div style="text-align: center; color: #94a3b8; padding: 2rem;">No interview questions found matching "${searchTerm}".</div>`;
        return;
    }

    filtered.forEach(qa => {
        let tagClass = "tag-btree";
        if(qa.category === "PLANNER") tagClass = "tag-planner";
        if(qa.category === "ADV") tagClass = "tag-adv";
        if(qa.category === "PERF") tagClass = "tag-perf";

        const card = document.createElement('div');
        card.className = 'qa-card';
        card.innerHTML = `
            <div class="card-header">
                <div class="q-num">${qa.num}</div>
                <h2>${qa.title}</h2>
            </div>
            <div class="tag-row">
                <span class="tag ${tagClass}">${qa.tagText}</span>
            </div>
            <div class="answer-content">
                ${qa.content}
            </div>
        `;
        list.appendChild(card);
    });
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    renderQA(e.target.value);
});

// Initial render
renderQA();
</script>
</body>
</html>
