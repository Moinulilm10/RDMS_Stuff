<script>

const chapters = [
// ────────────────────────────────────────────────────────
// CHAPTER 1: THE LIFECYCLE OF A SQL QUERY
// ────────────────────────────────────────────────────────
{
    title: "1. The Query Lifecycle",
    slides: [
        {
            title: "What Happens After SELECT * FROM users?",
            subtitle: "The journey of a SQL query through the RDBMS engine",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>When a junior engineer writes a query, they treat the database like a magical black box. When queries time out under 10,000 requests/sec, they don't know if the bottleneck is parsing overhead, poor selectivity estimation, buffer pool thrashing, or disk I/O waits.</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>An enterprise RDBMS executes a strict 5-stage pipeline when you send <code>SELECT * FROM users WHERE id = 42;</code>:</p>
                <div class="diagram-box">[ 1. SQL Parser ] ===> Translates text string into Abstract Syntax Tree (AST).
       ||
[ 2. Analyzer   ] ===> Validates table/column names against System Catalog & checks IAM permissions.
       ||
[ 3. Planner    ] ===> Cost-Based Optimizer (CBO) evaluates statistics & generates execution plans.
       ||
[ 4. Executor   ] ===> Pulls tuples using Volcano Iterator Model (open -> next -> close).
       ||
[ 5. Storage    ] ===> Fetches 4KB/8KB pages from Buffer Pool (RAM) or Disk Storage!</div>

                <span class="section-badge badge-senior">Senior Engineer Perspective</span>
                <div class="scenario-box">
                    <strong>💡 Prepared Statements & Plan Caching</strong>
                    In high-concurrency systems (Uber, Stripe), parsing and optimizing SQL on every request consumes up to 30% of database CPU! Using Prepared Statements (<code>PREPARE stmt FROM ...</code>) compiles the AST and caches the execution plan once, bypassing stages 1-3 on subsequent executions!
                </div>
            `,
            sql: `-- Step 1: Inspecting how the SQLite Query Planner optimizes a scan
DROP TABLE IF EXISTS users;
CREATE TABLE users (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    email TEXT NOT NULL UNIQUE,
    tier TEXT DEFAULT 'free',
    created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

INSERT INTO users (email, tier) VALUES 
('alice@stripe.com', 'pro'),
('bob@uber.com', 'enterprise'),
('charlie@google.com', 'free');

-- Execute EXPLAIN QUERY PLAN to see the exact execution strategy:
-- Notice how searching by PRIMARY KEY uses an instant B-Tree lookup!
EXPLAIN QUERY PLAN SELECT * FROM users WHERE id = 2;`
        },
        {
            title: "Cost-Based Optimizer (CBO) & Statistics",
            subtitle: "How the database calculates cardinality and selectivity",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>Why does the database sometimes ignore your index and perform a Full Table Scan? If an index scan requires seeking 80% of the rows in a table, jumping back and forth between the index B+ Tree and the data heap (random I/O) takes 10x longer than just sequentially scanning the physical disk blocks!</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>The <strong>Cost-Based Optimizer (CBO)</strong> calculates expected disk I/O and CPU cost using statistical histograms stored in system tables (e.g., <code>pg_stats</code> or <code>sqlite_stat1</code>):</p>
                <ul>
                    <li><strong>Selectivity:</strong> The fraction of rows matching a filter (<code>matching_rows / total_rows</code>).</li>
                    <li><strong>Cardinality:</strong> The number of unique distinct values in a column.</li>
                    <li><strong>The Golden Rule:</strong> If selectivity is high (&lt; 5% to 10% of table), CBO chooses an <strong>Index Scan</strong>. If selectivity is low (&gt; 20% of table), CBO chooses a sequential <strong>Full Table Scan</strong>!</li>
                </ul>

                <span class="section-badge badge-senior">Senior Engineer Perspective</span>
                <div class="scenario-box">
                    <strong>📊 Stale Statistics & ANALYZE</strong>
                    After bulk inserting 50 million rows, table statistics become stale. The CBO might think the table is empty and choose catastrophic nested loop joins! Senior engineers schedule automated <code>ANALYZE</code> or <code>VACUUM ANALYZE</code> tasks to keep histograms fresh.
                </div>
            `,
            sql: `-- Step 1: Create table with indexed column
DROP TABLE IF EXISTS orders_cbo;
CREATE TABLE orders_cbo (
    order_id INTEGER PRIMARY KEY AUTOINCREMENT,
    status TEXT NOT NULL,
    amount DECIMAL(10,2)
);

CREATE INDEX idx_orders_status ON orders_cbo(status);

-- Step 2: Insert 10 rows (9 'completed', 1 'pending')
INSERT INTO orders_cbo (status, amount) VALUES 
('completed', 10.00), ('completed', 20.00), ('completed', 30.00),
('completed', 40.00), ('completed', 50.00), ('completed', 60.00),
('completed', 70.00), ('completed', 80.00), ('completed', 90.00),
('pending', 999.00);

-- Step 3: Run ANALYZE to compute table histograms
ANALYZE orders_cbo;

-- Querying the rare 'pending' status (10% selectivity) -> Uses INDEX!
EXPLAIN QUERY PLAN SELECT * FROM orders_cbo WHERE status = 'pending';`
        },
        {
            title: "Execution Models: Volcano Iterator vs Vectorized",
            subtitle: "Tuple-at-a-time processing vs SIMD columnar batching",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>In analytical OLAP queries (aggregating 1 billion sales rows), traditional row-based database engines (PostgreSQL, MySQL) consume massive CPU time just making virtual function calls for every single row.</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <ul>
                    <li><strong>Volcano Iterator Model (OLTP):</strong> Every operator (Scan, Filter, Join) implements an <code>open()</code>, <code>next()</code>, and <code>close()</code> interface. It pulls one tuple at a time. High CPU function overhead, but extremely low memory footprint!</li>
                    <li><strong>Vectorized Execution (OLAP / ClickHouse / Snowflake):</strong> Operators process blocks of 1,024 or 4,096 tuples per <code>next()</code> call! This fits data directly into CPU L1/L2 caches and leverages SIMD (Single Instruction, Multiple Data) vector instructions for 100x speedups!</li>
                </ul>

                <span class="section-badge badge-senior">Senior Engineer Perspective</span>
                <div class="scenario-box">
                    <strong>⚙️ Choosing the Right Execution Engine</strong>
                    Never run heavy multi-billion row BI aggregations on an OLTP Volcano engine (PostgreSQL). Stream analytical events into a Vectorized Columnar engine (ClickHouse, BigQuery, Snowflake) where SIMD instructions shine!
                </div>
            `,
            sql: `-- Simulating Volcano Iterator execution vs Aggregation:
DROP TABLE IF EXISTS stream_metrics;
CREATE TABLE stream_metrics (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    metric_val INTEGER NOT NULL
);

INSERT INTO stream_metrics (metric_val) VALUES (10), (20), (30), (40), (50);

-- Notice how SQLite (an iterator model) evaluates aggregate SUM and COUNT:
SELECT COUNT(*) AS total_tuples, SUM(metric_val) AS sum_val, AVG(metric_val) AS avg_val
FROM stream_metrics;`
        }
    ]
},

// ────────────────────────────────────────────────────────
// CHAPTER 2: MEMORY & BUFFER POOL
// ────────────────────────────────────────────────────────
{
    title: "2. Memory & Buffer Pool",
    slides: [
        {
            title: "RAM vs Disk Hierarchy & The Buffer Pool",
            subtitle: "Why databases cache disk blocks in memory pages",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>Reading data from a physical disk (even an NVMe SSD) takes ~100,000 nanoseconds. Reading from RAM takes ~100 nanoseconds. If a database had to read from disk on every SQL query, system throughput would collapse to 1,000 queries per second!</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>The <strong>Buffer Pool</strong> is an in-memory cache managed directly by the database storage engine. It partitions RAM into fixed-size frames (typically <strong>4KB, 8KB, or 16KB</strong>) that mirror physical disk pages:</p>
                <div class="diagram-box">[ SQL Query ] ===&gt; Requests Page #42
     ||
[ Buffer Pool Lookup ]
     |-- (HIT!)  ===&gt; Return pointer to RAM memory frame in 100ns! ⚡
     |-- (MISS!) ===&gt; Fetch 8KB block from Disk SSD into empty RAM frame (~100,000ns)</div>

                <span class="section-badge badge-senior">Senior Engineer Perspective</span>
                <div class="scenario-box">
                    <strong>📈 Buffer Pool Hit Ratio Monitoring</strong>
                    In production (PostgreSQL/MySQL), senior engineers alert if the Buffer Pool Hit Ratio drops below <strong>99.0%</strong>! A hit ratio of 95% means 1 out of every 20 queries is stalling on slow disk I/O, indicating RAM is under-provisioned!
                </div>
            `,
            sql: `-- Step 1: Inspect SQLite Buffer Pool & Page Size settings
-- SQLite default page size is 4096 bytes (4KB):
PRAGMA page_size;

-- Check current buffer pool cache size (in number of pages):
PRAGMA cache_size;

-- Step 2: Create a sample table to see page allocation
DROP TABLE IF EXISTS buffer_test;
CREATE TABLE buffer_test (id INT PRIMARY KEY, payload TEXT);
INSERT INTO buffer_test VALUES (1, 'Cached in Buffer Pool RAM!');

-- Check total disk pages allocated by this database:
PRAGMA page_count;`
        },
        {
            title: "Eviction Policies: LRU vs Clock Sweep vs LRU-K",
            subtitle: "Preventing analytical queries from wiping out cached working sets",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>When the Buffer Pool is full and a new page is read from disk, an existing page must be evicted. Under basic <strong>Least Recently Used (LRU)</strong>, if a data analyst runs <code>SELECT * FROM historical_logs</code> (scanning 500GB of cold data), every hot production page is flushed out! The entire database stalls after the query!</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <p>Modern RDBMS use advanced eviction algorithms with <strong>Sequential Scan Resistance</strong>:</p>
                <ul>
                    <li><strong>Clock Sweep / Midpoint Insertion (InnoDB):</strong> Divides buffer pool into a "New Sublist" (top 63%) and "Old Sublist" (bottom 37%). New pages from disk enter at the midpoint! They only get promoted to the hot sublist if they are accessed a *second* time!</li>
                    <li><strong>LRU-K / 2Q (PostgreSQL):</strong> Tracks the time of the last $K$ accesses. A page must be hit multiple times before being granted long-term residence in RAM.</li>
                </ul>

                <span class="section-badge badge-senior">Senior Engineer Perspective</span>
                <div class="scenario-box">
                    <strong>🛡️ Isolating Analytics from OLTP</strong>
                    To prevent buffer pool pollution, never run ad-hoc full table scans on the primary read/write database node! Route heavy analytical queries to read-only replicas or data warehouses.
                </div>
            `,
            sql: `-- Simulating Buffer Pool Cache Tuning in SQLite:
-- Set cache size to a small number of pages (e.g., 500 pages = ~2MB RAM):
PRAGMA cache_size = 500;

DROP TABLE IF EXISTS cache_eviction_demo;
CREATE TABLE cache_eviction_demo (
    id INTEGER PRIMARY KEY,
    data_chunk TEXT
);

-- Insert records to fill memory pages:
INSERT INTO cache_eviction_demo VALUES (1, 'Hot OLTP Working Set Row');
INSERT INTO cache_eviction_demo VALUES (2, 'Cold Analytical Archive Row');

SELECT * FROM cache_eviction_demo;`
        },
        {
            title: "Dirty Pages, Pinning & Background Flushing",
            subtitle: "How modified RAM pages are safely persisted to disk",
            theory: `
                <span class="section-badge badge-prob">What Problem It Solves</span>
                <p>When an SQL statement updates a row (<code>UPDATE users SET balance = 500</code>), writing physical disk blocks immediately would slow transactions to a crawl. But if modified data only lives in RAM, what happens when someone pulls the server power cord?</p>

                <span class="section-badge badge-sol">Theoretical Deep Dive</span>
                <ul>
                    <li><strong>Dirty Page:</strong> A buffer pool memory frame that has been modified in RAM but not yet written to physical disk.</li>
                    <li><strong>Pinning:</strong> When an active thread is reading or modifying a page, it increments a "pin count" (latch). An evicted page cannot be removed while pinned!</li>
                    <li><strong>Background Checkpoint Threads:</strong> Dedicated background worker threads (e.g., PostgreSQL <code>bgwriter</code> or InnoDB Buffer Pool Flusher) continuously wake up, find dirty pages, and write them to disk asynchronously using sorted sequential I/O!</li>
                </ul>

                <span class="section-badge badge-senior">Senior Engineer Perspective</span>

// Initialize UI
function init() {
    renderSidebar();
    loadSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` })
        .then(SQL => {
            db = new SQL.Database();
            db.run("PRAGMA foreign_keys = ON;");
            db.run("PRAGMA journal_mode = WAL;");
            selectSlide(0, 0);
        }).catch(err => {
            document.getElementById('slideTitle').textContent = "Failed to load SQLite WASM";
            console.error(err);
        });
}

function renderSidebar() {
    const list = document.getElementById('chapterList');
    list.innerHTML = chapters.map((ch, cIdx) => `
        <div class="chapter-group">
            <div class="chapter-title">${ch.title}</div>
            ${ch.slides.map((sl, sIdx) => `
                <div class="slide-item ${cIdx === 0 && sIdx === 0 ? 'active' : ''}" 
                     id="slide_${cIdx}_${sIdx}" 
                     onclick="selectSlide(${cIdx}, ${sIdx})">
                    <span class="slide-num">${sIdx + 1}.</span>
                    <span>${sl.title}</span>
                </div>
            `).join('')}
        </div>
    `).join('');
}

function selectSlide(cIdx, sIdx) {
    currentChapterIdx = cIdx;
    currentSlideIdx = sIdx;
    
    document.querySelectorAll('.slide-item').forEach(el => el.classList.remove('active'));
    const activeEl = document.getElementById(`slide_${cIdx}_${sIdx}`);
    if (activeEl) activeEl.classList.add('active');

    const slide = chapters[cIdx].slides[sIdx];
    document.getElementById('slideTitle').textContent = slide.title;
    document.getElementById('slideSubtitle').textContent = slide.subtitle;
    document.getElementById('theoryPane').innerHTML = slide.theory;
    document.getElementById('sqlEditor').value = slide.sql.trim();

    resetCurrentSlide();
}

function resetCurrentSlide() {
    if (!db) return;
    const SQL = db.constructor;
    db.close();
    db = new SQL();
    db.run("PRAGMA foreign_keys = ON;");
    db.run("PRAGMA journal_mode = WAL;");
    
    document.getElementById('sqlEditor').value = chapters[currentChapterIdx].slides[currentSlideIdx].sql.trim();
    runSQL();
}

function runSQL() {
    if (!db) return;
    const sqlText = document.getElementById('sqlEditor').value;
    const resArea = document.getElementById('resultsArea');
    const startTime = performance.now();

    try {
        const results = db.exec(sqlText);
        const elapsed = (performance.now() - startTime).toFixed(1);

        if (results.length === 0) {
            resArea.innerHTML = `<div class="status-msg status-success">✅ Engine statements executed successfully (${elapsed}ms). Clean internal state.</div>`;
            return;
        }

        let html = `<div class="status-msg status-success">✅ Engine query execution completed in ${elapsed}ms</div>`;
        results.forEach(res => {
            html += `<table><thead><tr>${res.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>`;
            res.values.forEach(row => {
                html += `<tr>${row.map(v => `<td>${v === null ? '<i style="color:var(--text2)">NULL</i>' : v}</td>`).join('')}</tr>`;
            });
            html += `</tbody></table><br>`;
        });
        resArea.innerHTML = html;
    } catch (err) {
        resArea.innerHTML = `<div class="status-msg status-error">❌ Storage Engine Execution Error: ${err.message}</div>`;
    }
}

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runSQL();
    }
});

window.onload = init;
</script>
