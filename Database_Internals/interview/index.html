// 1. WHAT HAPPENS AFTER SELECT * FROM USERS?
// ────────────────────────────────────────────────────────
{
    num: "01",
    title: "Walk me through exactly what happens under the hood when I execute `SELECT * FROM users WHERE id = 42;` in an enterprise RDBMS.",
    category: "STORAGE",
    tagText: "Storage & Engine",
    content: `
        <h3>The Staff Engineer 5-Stage Pipeline Response</h3>
        <p>When a client submits an SQL query over a TCP/IP socket (e.g., PostgreSQL port 5432 or MySQL port 3306), the database executes a strict 5-stage architectural pipeline:</p>
        <ol>
            <li><strong>1. Transport &amp; Session Layer:</strong> The RDBMS assigns a worker thread or connection process to read the SQL string from the socket buffer.</li>
            <li><strong>2. Parser &amp; Lexical Analyzer:</strong> Tokenizes the query string and builds an Abstract Syntax Tree (AST). It verifies grammar and checks for syntax errors.</li>
            <li><strong>3. Analyzer / Binder:</strong> Checks the AST against the internal <strong>System Catalog</strong> (data dictionary). It resolves table name <code>users</code> to physical OIDs, validates that column <code>id</code> exists, and verifies IAM role permissions.</li>
            <li><strong>4. Cost-Based Optimizer (CBO) &amp; Query Planner:</strong> This is the brain of the engine. The CBO evaluates statistical histograms (cardinality and selectivity) in system tables. It compares multiple access paths:
                <ul>
                    <li><em>Path A:</em> Sequential Table Scan (reading all physical blocks from disk).</li>
                    <li><em>Path B:</em> B+ Tree Index Scan on <code>id</code> (seeking down the index tree to find the Row ID).</li>
                    <li>Because <code>id = 42</code> is a unique point lookup, the CBO calculates that an Index Scan costs ~3 disk seeks vs ~50,000 seeks for a Full Table Scan, selecting the Index Scan!</li>
                </ul>
            </li>
            <li><strong>5. Execution Engine &amp; Storage Layer:</strong> The executor uses the <strong>Volcano Iterator Model</strong>, calling <code>open()</code> and <code>next()</code> on the index scan operator. It asks the storage engine for physical page #X. The storage engine first checks the in-memory <strong>Buffer Pool</strong> (RAM). If it's a cache hit, data returns in 100ns! If a cache miss occurs, the engine issues an asynchronous SSD read (~100,000ns), loads the 8KB page into RAM, extracts tuple #42 from the slotted page array, checks MVCC visibility tags, and streams the binary result back over the TCP socket!</li>
        </ol>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters &amp; Hiring Managers</div>
            <div class="recruiter-text">
                "When discussing query execution with hiring managers, I emphasize **observability and CPU optimization**. In high-throughput microservices (like Uber or Stripe), parsing and optimizing SQL on every request consumes up to **30% of database CPU**. I explain how I implemented **Prepared Statements and Plan Caching** across our API gateways, bypassing the parser and optimizer entirely to reduce P99 database latency by 35% and save $50,000/year in RDS compute sizing!"
            </div>
        </div>
    `
},

// 2. WHY ARE B+ TREES PREFERRED OVER B-TREES AND BST?
// ────────────────────────────────────────────────────────
{
    num: "02",
    title: "Why do almost all relational databases (PostgreSQL, MySQL, SQLite) use B+ Trees instead of Binary Trees, AVL Trees, or standard B-Trees?",
    category: "BTREE",
    tagText: "B+ Tree Indexing",
    content: `
        <h3>The Architectural Trade-Off Analysis</h3>
        <p>Designing a disk-backed storage engine requires optimizing for **Disk I/O latency**, not CPU instructions. A physical disk read takes ~10 milliseconds on HDD or ~0.1 milliseconds on NVMe SSD, whereas RAM takes 100 nanoseconds.</p>
        <ul>
            <li><strong>Why Not Binary Search Trees (BST/AVL)?</strong> In a binary tree, every node has only 2 children. To index 20 million records, tree height is $log_2(20,000,000) \\approx 24$ levels! Traversing 24 levels requires 24 random disk seeks ($24 \\times 10ms = 240ms$ per lookup!).</li>
            <li><strong>Why B+ Trees? High Branching Factor!</strong> A B+ Tree node matches the exact physical block size of the OS/SSD (typically <strong>8KB or 16KB</strong>). Because internal nodes store ONLY keys and child page pointers (no bulky row data!), an 8KB page can store ~500 child pointers ($N=500$).</li>
            <li><strong>Ultra-Low Tree Height:</strong> With branching factor $N=500$, a 3-level tree indexes $500 \\times 500 \\times 500 = 125,000,000$ records! Finding any record takes at most **3 disk seeks**. Furthermore, because the Root and Level 1 nodes are permanently pinned in Buffer Pool RAM, finding any record in 100 million rows requires only **1 physical disk read**!</li>
            <li><strong>Why B+ Tree over standard B-Tree?</strong> In a standard B-Tree, data payloads are stored inside internal nodes alongside keys, shrinking the branching factor from 500 down to 50! Furthermore, B+ Tree leaf nodes are linked via a **Doubly Linked List**, making range queries (<code>WHERE id BETWEEN 100 AND 5000</code>) blazing fast sequential scans across leaf blocks!</li>
        </ul>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters &amp; Hiring Managers</div>
            <div class="recruiter-text">
                "When talking to engineering leaders, I frame indexing around **hardware economics and range scan efficiency**. I explain how I diagnosed a slow reporting pipeline that was doing random disk seeks, and redesigned the indexing strategy around B+ tree leaf sequential traversal. By aligning index node sizes with our AWS EBS SSD block boundaries and utilizing covering indexes, we reduced storage I/O bottlenecks by 80% without upgrading our hardware tier!"
            </div>
        </div>
    `
},

// ────────────────────────────────────────────────────────
// 3. CLUSTERED VS NON-CLUSTERED INDEX
// ────────────────────────────────────────────────────────
{
    num: "03",
    title: "What is the physical difference between a Clustered Index and a Non-Clustered Secondary Index? What is a 'Key Lookup' or 'Double Lookup' penalty?",
    category: "BTREE",
    tagText: "B+ Tree Indexing",
    content: `
        <h3>Physical Storage &amp; The Double Lookup Penalty</h3>
        <p>The difference lies in what is stored inside the leaf nodes of the B+ Tree:</p>
        <ul>
            <li><strong>Clustered Index (MySQL InnoDB Primary Key):</strong> The leaf nodes of the B+ Tree contain the **actual physical row data** (all columns!). A table can have ONLY ONE clustered index because data can only be physically sorted on disk in one order.</li>
            <li><strong>Non-Clustered Secondary Index:</strong> The leaf nodes store the indexed secondary attribute (e.g., <code>email = 'alice@corp.com'</code>) plus a pointer back to the primary record! In InnoDB, this pointer is the Primary Key value; in PostgreSQL, it is the physical Row ID (RID = Page# + Slot#).</li>
        </ul>
        <h3>What is the Double Lookup / Key Lookup Penalty?</h3>
        <p>If you execute <code>SELECT username, bio FROM users WHERE email = 'alice@corp.com';</code> in MySQL InnoDB:</p>
        <ol>
            <li>The engine traverses the secondary <code>email</code> B+ Tree to find the leaf node, retrieving Primary Key <code>id = 42</code>.</li>
            <li>Because <code>username</code> and <code>bio</code> are not stored in the secondary index, the engine must perform a **second complete B+ Tree traversal** down the Clustered Primary Key index to fetch the physical row data!</li>
            <li>This double traversal cuts query read throughput in half!</li>
        </ol>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters &amp; Hiring Managers</div>
            <div class="recruiter-text">
                "In interviews, I explain how I eliminated **Secondary Index Key Lookups** on high-traffic authentication endpoints by implementing **Covering Indexes** (using composite indexes or PostgreSQL's <code>INCLUDE</code> clause). By including frequently read attributes directly inside the secondary index leaf node, we converted two-step tree traversals into instant **Index-Only Scans**, doubling API request capacity during peak traffic hours!"
            </div>
        </div>
    `
},

// ────────────────────────────────────────────────────────
// 4. WRITE-AHEAD LOGGING (WAL) & ARIES RECOVERY
// ────────────────────────────────────────────────────────
{
    num: "04",
    title: "Why do databases use Write-Ahead Logging (WAL)? Explain how WAL turns random I/O into sequential I/O and how the ARIES recovery algorithm works after a server crash.",
    category: "WAL",
    tagText: "WAL & Recovery",
    content: `
        <h3>The Durability Mechanism &amp; I/O Physics</h3>
        <p>If a database wrote every row modification directly to physical data pages on disk during a transaction, updating 5 scattered records across a 100GB table would require 5 random disk seeks (~50 milliseconds total). Under 1,000 concurrent transactions, random disk I/O would paralyze the server!</p>
        <p>The **Write-Ahead Log (WAL)** solves this by enforcing a strict protocol: **No data page in RAM can be written to disk until the log record describing the change is sequentially appended and flushed (<code>fsync</code>) to the WAL log file!**</p>
        <ul>
            <li><strong>Why Sequential I/O is 100x Faster:</strong> Appending bytes to the tail of a log file requires zero disk head movement on HDDs and achieves maximum sequential block bandwidth on SSDs (&lt; 0.1ms per write!).</li>
        </ul>
        <h3>The ARIES Crash Recovery Protocol</h3>
        <p>When a server loses power at 3:00 AM and reboots, RAM buffer pools are completely erased! How does ARIES restore ACID consistency?</p>
        <ol>
            <li><strong>1. Analysis Phase:</strong> Scans the WAL forward from the last known Checkpoint LSN (Log Sequence Number) to determine which transactions were active at the moment of the crash and which Buffer Pool pages were dirty.</li>
            <li><strong>2. Redo Phase (Repeating History!):</strong> Replays ALL WAL log records forward from the oldest dirty page LSN, re-applying both committed and uncommitted changes! This restores physical disk pages to their exact state at the microsecond of the crash.</li>
            <li><strong>3. Undo Phase:</strong> Scans backward from the crash point, reading Undo logs to execute compensation rollbacks for any transactions that were uncommitted at crash time!</li>
        </ol>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters &amp; Hiring Managers</div>
            <div class="recruiter-text">
                "When presenting to recruiters or hiring managers, I tie WAL mechanics directly to **System Availability and Cost vs Performance trade-offs**. I discuss how I tuned PostgreSQL's <code>synchronous_commit</code> and <code>wal_buffers</code> for a logging ingestion microservice. By relaxing synchronous disk fsync for non-critical analytics while maintaining strict durability for billing ledgers, we scaled write ingestion from 3,000 TPS to 45,000 TPS on existing infrastructure without sacrificing financial ACID compliance!"
            </div>
        </div>
    `
},

// ────────────────────────────────────────────────────────

{
    num: "05",
    title: "How does Multi-Version Concurrency Control (MVCC) work in PostgreSQL and MySQL InnoDB? Why does MVCC cause table bloat, and how does VACUUM resolve it?",
    category: "MVCC",
    tagText: "MVCC & Concurrency",
    content: `
        <h3>Snapshot Isolation Without Read/Write Locks</h3>
        <p>In legacy databases without MVCC, when an analytical query spends 5 minutes scanning the <code>orders</code> table, it acquires a global shared read lock. All concurrent customer checkouts attempting to insert new orders freeze for 5 minutes!</p>
        <p><strong>MVCC enforces the golden rule of concurrency: Readers never block writers, and writers never block readers!</strong></p>
        <ul>
            <li><strong>PostgreSQL MVCC Mechanics:</strong> When you update a row (<code>UPDATE users SET balance = 500 WHERE id = 1</code>), PostgreSQL does NOT overwrite physical disk memory! Instead, it inserts a brand new tuple version with timestamp <code>xmin = current_txid</code>, and marks the old tuple with <code>xmax = current_txid</code>.</li>
            <li>When a concurrent read query executes, it inspects tuple headers and ignores any tuple versions whose <code>xmin</code> is newer than its transaction snapshot! It sees a consistent historical snapshot without taking any locks!</li>
        </ul>
        <h3>Why MVCC Causes Table Bloat &amp; The Role of VACUUM</h3>
        <p>Because old tuple versions are never overwritten in place, updating a row 10,000 times creates 1 alive tuple and 9,999 **Dead Tuples**! Without maintenance, table disk size bloats from 100MB to 50GB, causing sequential table scans and index lookups to become 100x slower!</p>
        <ul>
            <li><strong>PostgreSQL VACUUM / Autovacuum:</strong> Background worker processes scan physical pages, identify dead tuples whose <code>xmax</code> is older than the oldest active transaction in the database, wipe their line pointers, and make free space available for new inserts!</li>
        </ul>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters &amp; Hiring Managers</div>
            <div class="recruiter-text">
                "In Staff-level interviews, I use MVCC bloat as a case study in **proactive reliability engineering**. I share how I solved a production crisis where a rogue 12-hour analytical transaction blocked PostgreSQL Autovacuum, causing table bloat and transaction ID wraparound warnings. I established automated alerting on transaction horizon lag and configured aggressive autovacuum thresholds for high-churn tables, preventing database lockups and reclaiming 2TB of wasted SSD storage across our production fleet!"
            </div>
        </div>
    `
},

// ────────────────────────────────────────────────────────
// 6. BUFFER POOL EVICTION & SCAN RESISTANCE
// ────────────────────────────────────────────────────────
{
    num: "06",
    title: "Explain how Buffer Pool memory eviction works. Why is basic Least Recently Used (LRU) dangerous for databases, and how do algorithms like Clock Sweep or LRU-K prevent cache thrashing?",
    category: "STORAGE",
    tagText: "Storage & Engine",
    content: `
        <h3>The Problem with Basic LRU in Database Systems</h3>
        <p>The Buffer Pool caches disk blocks in RAM. Under a basic LRU eviction policy, whenever a new page is read from disk, the least recently accessed page in RAM is evicted. What happens if an engineer runs a backup or historical export: <code>SELECT * FROM five_year_audit_log;</code>?</p>
        <p>The query reads 500GB of cold historical blocks sequentially from disk into the Buffer Pool. As each cold block enters RAM, it evicts every single hot production page (user sessions, active carts, catalog items)! The Buffer Pool Hit Ratio drops from 99% to 0%! All live customer queries stall on slow disk I/O! This is **Buffer Pool Cache Thrashing**.</p>
        <h3>Scan-Resistant Eviction Algorithms</h3>
        <ul>
            <li><strong>Midpoint Insertion / Clock Sweep (MySQL InnoDB):</strong> InnoDB divides the buffer pool into two sublists: a "New Sublist" (top 63% of hot pages) and an "Old Sublist" (bottom 37% of cold pages). When a page is read from disk during a sequential scan, it enters at the **midpoint** (the top of the Old Sublist), NOT the top of the hot list! If it is only touched once during the scan, it gets quickly evicted from the bottom of the Old Sublist without ever polluting the 63% hot working set!</li>
            <li><strong>LRU-K / 2Q (PostgreSQL):</strong> Tracks the timestamps of the last $K$ accesses (typically $K=2$). A page must be accessed at least twice within a specific window before it is promoted to the long-term RAM cache!</li>
        </ul>

        <div class="recruiter-box">
            <div class="recruiter-header">🎤 How to Represent This to Technical Recruiters &amp; Hiring Managers</div>
            <div class="recruiter-text">
                "When speaking with hiring managers, I demonstrate architectural maturity by discussing **workload isolation and cache protection**. I explain how I separated OLTP and OLAP traffic by routing heavy analytical scans to read-only replicas, and tuned InnoDB buffer pool instances and midpoint insertion rules. This guaranteed 99.8% cache hit ratios for core checkout transactions even during massive data warehousing ETL jobs!"
            </div>
        </div>
    `
},

        <h3>LSM-Trees vs B+ Trees: The Hardware Physics</h3>
        <p>In high-scale IoT or event logging systems handling 100,000 writes/sec, B+ Tree page splits and random disk seeks cause massive **Write Amplification** (writing an entire 8KB physical block to disk just to insert one 50-byte record!).</p>
        <p><strong>LSM-Trees (Log-Structured Merge-Trees) eliminate random disk overwrites entirely by turning ALL writes into sequential log appends:</strong></p>
        <ol>
            <li><strong>MemTable (RAM):</strong> Incoming writes are appended to a sequential WAL log for durability and inserted into an in-memory sorted data structure (MemTable / SkipList in RAM).</li>
            <li><strong>SSTables (Disk):</strong> When the MemTable fills up (~64MB), it is flushed sequentially to disk as an immutable sorted file called an **SSTable (Sorted String Table)**. Zero random disk seeks!</li>
            <li><strong>Compaction:</strong> Dedicated background threads continuously merge and deduplicate smaller SSTables into larger level SSTables, cleaning up deleted or overwritten keys!</li>
        </ol>
        <h3>The Architectural Trade-Off Matrix</h3>
        <ul>
            <li><strong>Write Throughput:</strong> LSM-Trees achieve **10x higher write throughput** than B+ Trees because sequential SSD appends avoid page splits and random seek overhead!</li>
            <li><strong>Read Amplification:</strong> In a B+ Tree, finding a key takes 1 disk read (fetching the leaf node). In an LSM-Tree, finding a key might require checking the MemTable + 5 different disk SSTables! To solve this read amplification, LSM-Trees place in-memory **Bloom Filters** in front of every SSTable to instantly skip files that don't contain the key!</li>

            <li><strong>Why Autovacuum Freezing is Critical:</strong> Autovacuum scans tables and replaces old committed TXIDs with a special permanent frozen tag (<code>FrozenTransactionId = 2</code>). Once frozen, a tuple is permanently visible forever without risking wraparound!</li>

        <h3>Memory Latching &amp; Thread Safety</h3>
        <p>When an SQL query wants to read tuple #42 on Page #100, it asks the Buffer Pool manager for a memory pointer to that 8KB RAM frame. What would happen if, while the query thread is actively iterating over the Line Pointers in that RAM frame, the background LRU eviction thread decides to evict Page #100 and load a different block from disk into that exact memory space?</p>

        <p>To prevent concurrent eviction, every buffer frame includes an atomic integer called a **Pin Count (or Reference Count)**:</p>
        <ol>

            <li>The background LRU eviction algorithm is strictly forbidden from evicting any buffer frame whose <code>pin_count &gt; 0</code>!</li>

        <h3>Snapshot Isolation Mechanics</h3>
        <p>In **Snapshot Isolation (Repeatable Read in PostgreSQL)**, each transaction reads data from a consistent historical snapshot established at the moment the transaction began. It prevents Dirty Reads, Non-Repeatable Reads, and Phantom Reads without taking read locks! However, **Snapshot Isolation is NOT true Serializable isolation** because it permits an subtle concurrency race condition called **Write Skew**!</p>
        <h3>The Write Skew Anomaly (Hospital On-Call Example)</h3>
        <p>Imagine a hospital policy: **At least one doctor must be on-call at all times.** Currently, both Dr. Alice and Dr. Bob are on-call (2 doctors total).</p>
        <ol>
            <li>At 12:00:00 PM, Dr. Alice feels sick and executes Tx A: <code>SELECT count(*) FROM on_call WHERE active = true;</code>. The MVCC snapshot returns <code>count = 2</code>. Since $2 &gt; 1$, Alice executes: <code>UPDATE on_call SET active = false WHERE name = 'Alice';</code>.</li>
            <li>At the exact same millisecond (12:00:00 PM), Dr. Bob has an emergency and executes Tx B: <code>SELECT count(*) FROM on_call WHERE active = true;</code>. Bob's MVCC snapshot also returns <code>count = 2</code>! Since $2 &gt; 1$, Bob executes: <code>UPDATE on_call SET active = false WHERE name = 'Bob';</code>.</li>
